name: CI Build

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Skip Next.js telemetry
      NEXT_TELEMETRY_DISABLED: "1"
      # CI mode - prevents prisma from connecting to DB
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Show Node version
        run: node --version

      - name: Show npm version
        run: npm --version

      - name: Show cache
        run: ls -la node_modules 2>/dev/null || echo "No node_modules cached"

      - name: Install dependencies
        run: npm ci --loglevel=verbose

      - name: Generate Prisma client
        run: npx prisma generate --no-engine

      - name: Build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          retention-days: 3
