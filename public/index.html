<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RectoBoost Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #030914;
        --panel: #07111f;
        --panel-2: #0a1627;
        --panel-3: #0d1b30;
        --line: rgba(124, 167, 231, 0.16);
        --line-strong: rgba(109, 160, 255, 0.32);
        --text: #f7faff;
        --soft: #c8d2e6;
        --muted: #8c99b0;
        --blue: #0877ff;
        --blue-2: #1a8cff;
        --orange: #ff7a1a;
        --green: #05d98b;
        --red: #ff4f55;
        --yellow: #ffb31a;
        --purple: #8b5cf6;
        --radius: 8px;
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
      }

      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(circle at 76% 8%, rgba(9, 107, 255, 0.18), transparent 26%),
          radial-gradient(circle at 22% 94%, rgba(0, 132, 255, 0.12), transparent 25%),
          var(--bg);
        font-family: "Poppins", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      a, button, input, textarea, select { font: inherit; color: inherit; }
      button { cursor: pointer; }
      a { color: inherit; text-decoration: none; }
      svg { display: block; }

      .app {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        min-height: 100vh;
      }

      .sidebar {
        position: sticky;
        top: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        padding: 34px 20px 32px;
        border-right: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(3, 10, 20, 0.98), rgba(3, 10, 20, 0.9));
      }

      .logo {
        display: flex;
        align-items: center;
        height: 66px;
        padding-left: 10px;
      }

      .logo img { width: 224px; max-width: 100%; height: auto; }
      .nav { display: grid; gap: 12px; margin-top: 46px; }

      .nav-item {
        display: grid;
        grid-template-columns: 31px 1fr;
        align-items: center;
        min-height: 56px;
        padding: 0 19px;
        color: #d6def1;
        border-radius: var(--radius);
        font-size: 15px;
        font-weight: 600;
        transition: 0.16s ease;
      }

      .nav-item svg, .icon {
        width: 21px;
        height: 21px;
        stroke: currentColor;
        stroke-width: 1.85;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .nav-item:hover { background: rgba(20, 36, 60, 0.62); }
      .nav-item.active {
        color: #fff;
        background: linear-gradient(135deg, #0975ff, #075de7);
        box-shadow: 0 14px 28px rgba(8, 119, 255, 0.22);
      }

      .footer-copy {
        margin: auto 0 0 14px;
        color: #91a0ba;
        font-size: 14px;
        line-height: 1.75;
      }

      .main {
        min-width: 0;
        height: 100vh;
        overflow: auto;
        padding: 24px 34px 26px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 62px;
        margin-bottom: 16px;
      }

      .hamburger {
        display: grid;
        gap: 6px;
        width: 34px;
        padding: 0;
        border: 0;
        color: #f5f8ff;
        background: transparent;
      }

      .hamburger span {
        width: 26px;
        height: 2px;
        border-radius: 999px;
        background: currentColor;
      }

      .hamburger span:nth-child(2) { width: 19px; }
      .top-actions { display: flex; align-items: center; gap: 26px; }
      .balance, .user { display: flex; align-items: center; gap: 12px; }

      .wallet-icon, .bell, .avatar, .circle-icon {
        display: grid;
        place-items: center;
        flex: 0 0 auto;
      }

      .wallet-icon {
        width: 31px;
        height: 31px;
        color: #1487ff;
        border: 1px solid rgba(20, 135, 255, 0.7);
        border-radius: 7px;
        background: rgba(20, 135, 255, 0.1);
      }

      .bell {
        position: relative;
        width: 34px;
        height: 34px;
        color: #bcc8df;
      }

      .bell::after { display: none; }

      .avatar {
        overflow: hidden;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: #d7e2f3;
      }

      .avatar img { width: 100%; height: 100%; object-fit: cover; }
      .balance-label, .role, .muted, .subtle { color: var(--muted); }
      .balance-value, .user-name { color: var(--text); font-weight: 800; }
      .user-name { white-space: nowrap; }

      .view {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(4, 13, 25, 0.44);
        box-shadow: var(--shadow);
      }

      .shell { padding: 28px; }
      .page-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 20px;
      }

      h1, h2, h3, p { margin-top: 0; }
      h1 { margin-bottom: 6px; font-size: 29px; line-height: 1.2; letter-spacing: 0; font-weight: 800; }
      h2 { margin-bottom: 8px; font-size: 17px; line-height: 1.25; font-weight: 750; }
      h3 { margin-bottom: 8px; font-size: 15px; line-height: 1.3; font-weight: 700; }
      p { color: var(--soft); line-height: 1.55; }

      .crumb {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--soft);
        font-size: 14px;
      }

      .card {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 12px;
        background:
          linear-gradient(180deg, rgba(12, 27, 48, 0.86), rgba(5, 14, 27, 0.88)),
          var(--panel);
      }

      .section { padding: 24px; }
      .grid { display: grid; gap: 16px; }
      .two-col { display: grid; grid-template-columns: minmax(0, 1.32fr) minmax(320px, 0.68fr); gap: 18px; }
      .three-col { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
      .top-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
      .lower-grid { display: grid; grid-template-columns: 1.35fr 0.85fr; gap: 16px; }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        min-height: 44px;
        padding: 0 20px;
        color: #fff;
        border: 1px solid rgba(210, 226, 255, 0.22);
        border-radius: var(--radius);
        background: rgba(12, 25, 44, 0.78);
        font-size: 14px;
        font-weight: 750;
      }

      .btn.primary {
        border-color: transparent;
        background: linear-gradient(135deg, #087bff, #075de7);
      }

      .btn.ghost { color: var(--blue-2); border-color: rgba(8, 119, 255, 0.58); background: rgba(8, 119, 255, 0.06); }
      .btn.small { min-height: 38px; padding: 0 16px; font-size: 13px; }
      .btn.block { width: 100%; }

      .hero {
        position: relative;
        display: flex;
        align-items: center;
        overflow: hidden;
        min-height: 292px;
        padding: 40px 46px;
        background:
          linear-gradient(90deg, rgba(7, 17, 32, 0.98) 0%, rgba(7, 17, 32, 0.92) 35%, rgba(7, 17, 32, 0.35) 62%, rgba(7, 17, 32, 0.08) 100%),
          url("assets/hero-abstract-bg.png") right center / cover no-repeat,
          linear-gradient(115deg, #071120 0%, #06152c 56%, #041a43 100%);
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 78% 52%, rgba(33, 137, 255, 0.28), transparent 34%),
          linear-gradient(90deg, rgba(3, 9, 20, 0.28), transparent 52%);
      }

      .hero-copy { position: relative; z-index: 1; max-width: 650px; }
      .eyebrow { margin: 0 0 14px; color: #d5def4; font-size: 15px; font-weight: 600; }
      .hero h1 { display: grid; gap: 4px; max-width: 700px; font-size: 40px; line-height: 1.18; font-weight: 850; }
      .hero p { max-width: 590px; margin: 19px 0 24px; color: #c1cbdd; font-size: 16px; }
      .actions { display: flex; flex-wrap: wrap; gap: 14px; }

      /* ── Top stat cards (4-up) ───────────────────────────────── */
      .top-card {
        position: relative; display: flex; flex-direction: column;
        height: 158px; padding: 18px 20px;
      }
      .top-card-icon {
        position: absolute; top: 16px; right: 16px;
        width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
      }
      .top-card-icon svg { width: 17px; height: 17px; stroke-width: 2; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }
      .top-card-center {
        flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 5px;
      }
      .top-card-label {
        font-size: 11px; font-weight: 700; color: var(--muted);
        text-transform: uppercase; letter-spacing: .07em; line-height: 1.4;
      }
      .top-card-value { font-size: 26px; font-weight: 800; line-height: 1.1; letter-spacing: -.01em; }
      .top-card-platforms { display: flex; align-items: center; gap: 6px; }
      .top-card-foot { display: flex; align-items: center; padding-top: 10px; border-top: 1px solid var(--line); margin-top: 0; }
      /* legacy compat */
      .wallet-tile { display: none; }
      .wallet-bottom { display: flex; align-items: center; margin-top: 14px; }
      .quick-order-foot { display: flex; align-items: center; justify-content: space-between; gap: 18px; }
      .amount { font-size: 26px; line-height: 1.1; font-weight: 800; white-space: nowrap; }

      .pill, .tag, .status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 24px;
        padding: 0 9px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 750;
        white-space: nowrap;
      }
      .pill { color: var(--green); background: rgba(0, 217, 139, 0.13); }
      .tag { color: #78baff; background: rgba(0, 119, 255, 0.16); }
      .status.completed, .status.open { color: var(--green); background: rgba(0, 185, 111, 0.16); }
      .status.processing, .status.info { color: #00b7ff; background: rgba(0, 119, 255, 0.16); }
      .status.pending, .status.warning { color: var(--orange); background: rgba(255, 139, 0, 0.14); }
      .status.resolved { color: #c08cff; background: rgba(139, 92, 246, 0.18); }

      .platforms { display: flex; align-items: center; gap: 18px; }
      .platform {
        display: grid;
        place-items: center;
        width: 36px;
        height: 36px;
        border-radius: 11px;
        color: #fff;
        box-shadow: 0 0 18px rgba(0, 119, 255, 0.24);
      }
      .platform svg { width: 20px; height: 20px; fill: currentColor; }
      .instagram { background: radial-gradient(circle at 30% 105%, #ffd35a, #fa2f62 45%, #7144ff); }
      .youtube { background: #ff1f18; }
      .tiktok { background: #05070b; }
      .telegram { background: #26a6e8; }
      .spotify { background: #17d760; color: #03120a; }
      .facebook { background: #1877f2; }
      .twitter { background: #0f172a; }
      .linkedin { background: #0a66c2; }
      .discord { background: #5865f2; }
      .twitch { background: #9146ff; }
      .soundcloud { background: #ff5500; }
      .pinterest { background: #e60023; }
      .threads { background: #111827; }
      .website { background: #0ea5e9; }
      .reviews { background: #f59e0b; }
      .traffic { background: #14b8a6; }
      .whatsapp { background: #22c55e; }
      .other { background: #64748b; }

      .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 18px; }
      .select, .field, .textarea {
        width: 100%;
        min-height: 42px;
        color: var(--text);
        border: 1px solid rgba(130, 166, 224, 0.18);
        border-radius: var(--radius);
        background: rgba(7, 17, 32, 0.8);
        outline: none;
      }
      .select { width: auto; padding: 0 14px; font-size: 13px; font-weight: 700; }
      .field { padding: 0 14px; }
      .textarea { min-height: 110px; padding: 14px; resize: vertical; }

      .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
      .metric { min-height: 104px; padding: 16px; border-radius: var(--radius); background: rgba(17, 34, 59, 0.72); }
      .metric span:first-child { display: block; color: #d8e0f1; font-size: 12px; }
      .metric strong { display: block; margin: 8px 0; font-size: 22px; line-height: 1.15; }
      .trend { color: var(--green); font-size: 12px; font-weight: 900; }
      .trend.bad { color: var(--red); }
      .chart { width: 100%; height: 170px; margin-top: 10px; }

      .order-row {
        display: grid;
        grid-template-columns: 42px 1fr auto 16px;
        align-items: center;
        gap: 12px;
        min-height: 56px;
      }
      .service-icon { width: 38px; height: 38px; border-radius: 11px; }
      .order-title { margin: 0 0 2px; color: #fff; font-weight: 800; }
      .order-id { color: var(--muted); font-size: 12px; }

      .announcement {
        display: grid;
        grid-template-columns: auto auto minmax(220px, 1fr) auto;
        gap: 16px;
        align-items: center;
        min-height: 58px;
        padding: 0 26px;
      }
      .announce-title { display: flex; align-items: center; gap: 12px; white-space: nowrap; font-size: 17px; font-weight: 900; }
      .new-pill { padding: 5px 9px; color: #fff; border-radius: 9px; background: linear-gradient(135deg, #ff9d23, #ff6817); font-size: 12px; font-weight: 800; }
      .announcement p { margin: 0; font-size: 13px; }

      .stepper {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        min-height: 62px;
        padding: 14px 22px;
      }
      .step { display: flex; align-items: center; gap: 12px; color: var(--soft); font-size: 13px; font-weight: 600; }
      .step:not(:last-child)::after { content: ""; flex: 1; height: 1px; margin-left: auto; background: rgba(160, 180, 210, 0.25); }
      .step-num {
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        color: #fff;
        background: rgba(120, 139, 165, 0.18);
        font-weight: 800;
      }
      .step.active .step-num, .step.done .step-num { background: linear-gradient(135deg, #0a78ff, #0866e6); }

      .category-grid { display: grid; grid-template-columns: repeat(8, minmax(0, 1fr)); gap: 10px; margin-top: 16px; }
      .category {
        display: grid;
        place-items: center;
        gap: 8px;
        min-height: 76px;
        padding: 10px;
        border: 1px solid rgba(130, 166, 224, 0.18);
        border-radius: var(--radius);
        background: rgba(7, 17, 32, 0.65);
        color: var(--soft);
        font-size: 12px;
      }
      .category.active { border-color: var(--blue); background: rgba(8, 119, 255, 0.09); color: #fff; }
      .filters { display: grid; grid-template-columns: minmax(220px, 1fr) 150px 170px auto; gap: 12px; margin: 18px 0 14px; }
      .service-list { border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
      .service-row {
        display: grid;
        grid-template-columns: 44px 1fr auto auto;
        align-items: center;
        gap: 14px;
        min-height: 80px;
        padding: 14px 16px;
        border-bottom: 1px solid rgba(124, 167, 231, 0.11);
        background: rgba(7, 17, 32, 0.28);
      }
      .service-row:last-child { border-bottom: 0; }
      .service-row.selected { outline: 1px solid var(--blue); background: rgba(8, 119, 255, 0.08); }
      .service-name { font-size: 14px; line-height: 1.35; }
      .service-desc { display: inline-block; margin-top: 3px; font-size: 12px; line-height: 1.45; }
      .price { color: #fff; font-weight: 800; text-align: right; }
      .price span { display: block; color: var(--muted); font-size: 12px; font-weight: 500; }

      .summary-card { position: relative; top: auto; }
      .empty-state {
        display: grid;
        place-items: center;
        min-height: 230px;
        padding: 24px;
        text-align: center;
        border: 1px dashed rgba(130, 166, 224, 0.25);
        border-radius: var(--radius);
        color: var(--muted);
      }
      .summary-row, .detail-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 12px 0;
        border-bottom: 1px solid rgba(124, 167, 231, 0.11);
      }
      .summary-row:last-child, .detail-row:last-child { border-bottom: 0; }
      .total { color: var(--blue); font-size: 22px; font-weight: 900; }
      .notice {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 13px;
        color: #dff7ff;
        border: 1px solid rgba(8, 119, 255, 0.32);
        border-radius: var(--radius);
        background: rgba(8, 119, 255, 0.11);
        font-size: 12.5px;
        font-weight: 600;
      }

      .package-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; }
      .package-card {
        position: relative;
        min-height: 112px;
        padding: 16px 12px;
        color: #111827;
        text-align: center;
        border: 2px solid rgba(23, 55, 105, 0.14);
        border-radius: var(--radius);
        background: #ffffff;
        transition: border-color .15s, box-shadow .15s;
      }
      .package-card:hover { border-color: var(--blue); }
      .package-card.active { border-color: var(--blue); background: #edf6ff; box-shadow: 0 0 0 3px rgba(8,119,255,.14); }
      .package-card strong { color: #111827; font-weight: 700; }
      .pkg-price { margin: 8px 0 4px; font-size: 13px; font-weight: 700; color: #111827; }
      .pkg-price span { display: block; font-size: 11px; font-weight: 400; color: #526174; }
      .pkg-total { font-size: 11.5px; color: #526174; }
      .pkg-total strong { color: var(--blue); }
      .range-row { display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center; }
      .qty-box { display: flex; align-items: center; justify-content: space-between; min-width: 150px; height: 48px; border: 1px solid var(--line); border-radius: var(--radius); padding: 0 10px; }
      .qty-box button { width: 32px; height: 32px; border: 0; color: #fff; border-radius: 8px; background: rgba(255, 255, 255, 0.06); }
      input[type="range"] { width: 100%; accent-color: var(--blue); }

      .bottom-bar {
        display: grid;
        grid-template-columns: repeat(3, 1fr) minmax(220px, 0.8fr);
        gap: 16px;
        align-items: center;
        padding: 18px 22px;
      }

      .table-card { overflow: hidden; }
      .table-tools { display: grid; grid-template-columns: minmax(280px, 1fr) 170px 170px auto; gap: 12px; padding: 20px; border-bottom: 1px solid var(--line); }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 16px 20px; text-align: left; border-bottom: 1px solid rgba(124, 167, 231, 0.1); font-size: 14px; vertical-align: middle; }
      th { color: #fff; background: rgba(13, 27, 48, 0.72); font-size: 13px; font-weight: 800; }
      tr:last-child td { border-bottom: 0; }
      .table-foot { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; }
      .pages { display: flex; gap: 8px; }
      .page-btn { min-width: 38px; height: 38px; border: 1px solid var(--line); border-radius: var(--radius); color: #fff; background: rgba(7, 17, 32, 0.65); }
      .page-btn.active { border-color: var(--blue); background: var(--blue); }

      .info-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
      .info-tile { padding: 16px; border-radius: var(--radius); background: rgba(17, 34, 59, 0.58); }
      .timeline { display: grid; gap: 0; }
      .timeline-item { display: grid; grid-template-columns: 42px 1fr 1fr; gap: 14px; padding: 14px 0; border-bottom: 1px solid rgba(124, 167, 231, 0.1); }
      .timeline-item:last-child { border-bottom: 0; }
      .circle-icon {
        width: 36px;
        height: 36px;
        color: var(--blue-2);
        border-radius: 50%;
        background: rgba(8, 119, 255, 0.13);
      }

      .amount-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
      .amount-card { min-height: 86px; padding: 16px; border: 1px solid var(--line); border-radius: var(--radius); background: rgba(7, 17, 32, 0.55); }
      .amount-card.active { border-color: var(--blue); background: rgba(8, 119, 255, 0.08); }
      .amount-card strong { color: var(--text); }
      .method-row { display: grid; grid-template-columns: 30px 36px 1fr auto; gap: 10px; align-items: center; min-height: 62px; padding: 11px; border: 1px solid var(--line); border-radius: var(--radius); background: rgba(7, 17, 32, 0.45); }
      .method-row.active { border-color: var(--blue); background: rgba(8, 119, 255, 0.09); }
      .method-row strong { color: var(--text); }
      .payment-icon { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; color: var(--blue); background: rgba(8, 119, 255, 0.1); }
      .payment-icon .icon { width: 17px; height: 17px; }

      .stat-cards { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
      .mini-stat { min-height: 108px; padding: 18px; }
      .donut {
        width: 160px;
        aspect-ratio: 1;
        border-radius: 50%;
        background: conic-gradient(var(--green) 0 64%, var(--blue) 64% 85%, var(--yellow) 85% 93%, var(--purple) 93% 97%, var(--red) 97% 100%);
        display: grid;
        place-items: center;
        margin: auto;
      }
      .donut::before {
        content: "152\A Total";
        white-space: pre;
        display: grid;
        place-items: center;
        width: 94px;
        aspect-ratio: 1;
        border-radius: 50%;
        background: #07111f;
        color: #fff;
        text-align: center;
        font-weight: 800;
      }

      .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
      .field-group label { display: block; margin: 0 0 8px; color: #fff; font-size: 13px; font-weight: 600; }
      .switch-row { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 12px 0; }
      .switch { width: 44px; height: 26px; border-radius: 99px; background: var(--blue); padding: 3px; flex-shrink: 0; transition: background .2s; }
      .switch::before { content: ""; display: block; width: 20px; height: 20px; border-radius: 50%; background: #fff; transform: translateX(18px); transition: transform .2s; box-shadow: 0 1px 4px rgba(0,0,0,.18); }
      .switch.off { background: #344155; }
      .switch.off::before { transform: none; }

      .auth-page {
        min-height: 100vh;

        grid-template-columns: minmax(460px, 0.95fr) minmax(440px, 0.82fr);
        gap: 56px;
        align-items: center;
        padding: 48px 72px;
        background:
          radial-gradient(circle at 18% 18%, rgba(0, 116, 255, 0.10), transparent 30%),
          radial-gradient(circle at 82% 82%, rgba(255, 122, 26, 0.08), transparent 30%),

      .auth-brand {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow: hidden;
        min-height: 620px;
        padding: 10px 0;
      }
      .auth-brand::after {
        display: none;
      }
      .auth-brand img { width: 280px; margin-bottom: 34px; }
      .auth-brand h1 { max-width: 650px; font-size: 38px; line-height: 1.12; }
      .auth-brand p { max-width: 540px; font-size: 19px; line-height: 1.55; }
      .auth-features { position: relative; z-index: 1; display: grid; gap: 14px; margin-top: 28px; max-width: 560px; }
      .auth-feature {
        display: grid;

        gap: 14px;
        align-items: center;
        padding: 12px 14px;
        border: 1px solid rgba(23, 55, 105, 0.10);
        border-radius: 12px;
        background: rgba(255,255,255,.62);
      }
      .auth-feature .circle-icon { width: 38px; height: 38px; }
      .auth-platforms {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        max-width: 560px;
        margin-top: 18px;
      }
      .auth-platform-card {
        display: grid;
        place-items: center;
        min-height: 72px;
        border: 1px solid rgba(23, 55, 105, 0.10);
        border-radius: 14px;
        background: rgba(255,255,255,.72);
        box-shadow: 0 14px 34px rgba(15, 23, 42, 0.06);
      }
      .auth-platform-card .platform { width: 34px; height: 34px; }
      .auth-note { color: var(--muted); font-size: 13px; text-align: center; margin: -2px 0 0; }
      .auth-card {
        align-self: center;
        width: 100%;
        max-width: 700px;
        min-height: 0;
        padding: 44px 52px;
        border: 1px solid var(--line-strong);
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(12, 27, 48, 0.72), rgba(5, 14, 27, 0.84));
        box-shadow: var(--shadow);
      }
      .auth-card h1 { font-size: 32px; margin-bottom: 6px; }
      .auth-card > p { margin-bottom: 26px; }
      .auth-form { display: grid; gap: 16px; margin-top: 0; }
      .auth-actions { display: grid; gap: 12px; margin-top: 20px; text-align: center; }
      .divider { display: grid; grid-template-columns: 1fr auto 1fr; gap: 18px; align-items: center; color: var(--muted); }
      .divider::before, .divider::after { content: ""; height: 1px; background: var(--line); }
      .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .auth-error {
        display: none;
        padding: 10px 12px;
        color: #991b1b;
        border: 1px solid rgba(239, 68, 68, 0.24);
        border-radius: 8px;
        background: #fef2f2;
        font-size: 12px;
        font-weight: 600;
      }
      .auth-error.show { display: block; }
      /* ── Payment method groups ───────────────────────────────── */
      .pay-group { border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; margin-bottom: 8px; }
      .pay-group-head {
        width: 100%; display: flex; align-items: center; gap: 12px;
        padding: 14px 18px; background: transparent; border: 0; color: inherit;
        cursor: pointer; text-align: left; transition: background .15s;
      }
      .pay-group-head:hover { background: rgba(20,36,60,.5); }
      .pay-group-head.has-selected { color: var(--blue-2); }
      .pay-group-arrow svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; transition: transform .2s; }
      .pay-group-head.open .pay-group-arrow svg { transform: rotate(180deg); }
      .pay-group-body { border-top: 1px solid var(--line); padding: 14px 16px; }
      .pay-method-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
      .pay-method-card {
        position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 8px; padding: 14px 8px; border: 1.5px solid var(--line); border-radius: 10px;
        background: transparent; cursor: pointer; transition: border-color .15s, background .15s; color: inherit;
        text-align: center; min-height: 88px;
      }
      .pay-method-card:hover { border-color: var(--blue); background: rgba(8,119,255,.06); }
      .pay-method-card.active { border-color: var(--blue); background: rgba(8,119,255,.1); }
      .pay-method-logo { width: 48px; height: 32px; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 6px; padding: 4px; overflow: hidden; }
      .pay-method-logo img { width: 100%; height: 100%; object-fit: contain; }
      .pay-method-logo svg { width: 20px; height: 20px; }
      .pay-method-name { font-size: 11px; font-weight: 600; line-height: 1.3; color: var(--soft); }
      .pay-method-check { position: absolute; top: 6px; right: 6px; color: var(--blue); }
      .pay-method-check svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.5; fill: none; }

      .pw-wrap { position: relative; display: block; }
      .pw-wrap .field { padding-right: 46px; width: 100%; }
      .pw-toggle {
        position: absolute; right: 0; top: 0; bottom: 0; width: 44px;
        background: none; border: none; padding: 0;
        display: flex; align-items: center; justify-content: center;
        color: var(--muted); cursor: pointer; transition: color .15s;
      }
      .pw-toggle:hover { color: var(--soft); }
      .pw-toggle svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .btn-google {
        display: flex; align-items: center; justify-content: center; gap: 10px;
        width: 100%; padding: 11px 20px; background: #fff; color: #3c4043;
        border: 1.5px solid #dadce0; border-radius: var(--radius);
        font-weight: 600; font-size: 14px; cursor: pointer; transition: box-shadow .15s;
      }
      .btn-google:hover { box-shadow: 0 1px 8px rgba(0,0,0,.22); }
      .other-service-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }
      .other-service-card {
        display: grid;
        grid-template-columns: 32px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        min-height: 70px;
        padding: 12px;
      }
      .other-service-card strong { display: block; font-size: 11.5px; line-height: 1.22; }
      .other-service-card span:last-child { font-size: 10px; line-height: 1.25; }
      .service-speed strong { font-size: 13px; line-height: 1.2; }
      .service-speed .muted { font-size: 11px; }
      .compact-service-list .service-row { grid-template-columns: 32px 1fr auto auto; min-height: 60px; }

      @media (min-width: 901px) {
        body.app-mode .app { grid-template-columns: 220px minmax(0, 1fr); }
        body.app-mode .sidebar { padding: 24px 16px 24px; }
        body.app-mode .logo { height: 50px; padding-left: 6px; }
        body.app-mode .logo img { width: 166px; }
        body.app-mode .nav { gap: 8px; margin-top: 30px; }
        body.app-mode .nav-item { min-height: 42px; padding: 0 13px; font-size: 12.5px; grid-template-columns: 26px 1fr; }
        body.app-mode .nav-item svg { width: 17px; height: 17px; }
        body.app-mode .footer-copy { font-size: 11.5px; line-height: 1.55; }
        body.app-mode .main { padding: 18px 24px 20px; overflow: auto; }
        body.app-mode .topbar { height: 46px; margin-bottom: 10px; }
        body.app-mode .top-actions { gap: 18px; }
        body.app-mode .hamburger span { width: 23px; }
        body.app-mode .hamburger span:nth-child(2) { width: 17px; }
        body.app-mode .wallet-icon { width: 27px; height: 27px; }
        body.app-mode .avatar { width: 38px; height: 38px; }
        body.app-mode .user-name,
        body.app-mode .balance-value { font-size: 12.5px; }
        body.app-mode .role,
        body.app-mode .balance-label { font-size: 10.5px; }
        body.app-mode .shell { padding: 22px; }
        body.app-mode .page-head { margin-bottom: 16px; }
        body.app-mode h1 { font-size: 24px; }
        body.app-mode h2 { font-size: 15px; }
        body.app-mode p,
        body.app-mode .crumb,
        body.app-mode td,
        body.app-mode th { font-size: 12.5px; }
        body.app-mode .section { padding: 18px; }
        body.app-mode .btn { min-height: 38px; padding: 0 16px; font-size: 12px; }
        body.app-mode .btn.small { min-height: 32px; padding: 0 12px; font-size: 11.5px; }
        body.app-mode .field,
        body.app-mode .select { min-height: 38px; font-size: 12px; }
        body.app-mode .two-col { gap: 14px; }
        body.app-mode .grid { gap: 14px; }
        body.app-mode .card { border-radius: 11px; }
        body.app-mode .summary-row,
        body.app-mode .detail-row { padding: 10px 0; }
        body.app-mode .notice { padding: 9px 11px; font-size: 11.5px; }
        body.app-mode .service-row { min-height: 64px; padding: 10px 14px; gap: 12px; }
        body.app-mode .service-name { font-size: 12.5px; line-height: 1.28; }
        body.app-mode .service-desc { font-size: 10.8px; line-height: 1.35; }
        body.app-mode .service-row .pill,
        body.app-mode .service-row .tag { min-height: 18px; padding: 0 7px; font-size: 9.5px; }
        body.app-mode .service-row .price { font-size: 12px; }
        body.app-mode .service-row .price span,
        body.app-mode .service-row .muted { font-size: 10.5px; }
        body.app-mode .service-row .platform { width: 30px; height: 30px; border-radius: 9px; }
        body.app-mode .service-row .platform svg { width: 16px; height: 16px; }
        body.dashboard-mode { overflow: hidden; }
        body.dashboard-mode .content {
          display: grid;
          height: calc(100vh - 94px);
          grid-template-rows: 215px 92px minmax(0, 1fr) 46px;
          gap: 10px;
        }
        body.dashboard-mode .top-grid,
        body.dashboard-mode .lower-grid { gap: 10px; }
        body.dashboard-mode .hero { min-height: 0; padding: 18px 34px; }
        body.dashboard-mode .hero h1 { font-size: clamp(23px, 1.48vw, 28px); line-height: 1.13; }
        body.dashboard-mode .eyebrow { margin-bottom: 8px; font-size: 11.5px; }
        body.dashboard-mode .hero p { font-size: 11.2px; margin: 10px 0 14px; max-width: 560px; }
        body.dashboard-mode .hero .btn { min-height: 34px; padding: 0 14px; font-size: 11.5px; gap: 8px; }
        body.dashboard-mode .hero .btn .icon { width: 17px; height: 17px; }
        body.dashboard-mode .top-card { min-height: 0; padding: 14px 18px; }
        body.dashboard-mode .top-card-value { font-size: 20px; }
        body.dashboard-mode .top-card-label { font-size: 10px; }
        body.dashboard-mode .top-card-icon { width: 36px; height: 36px; border-radius: 10px; }
        body.dashboard-mode .top-card-icon svg { width: 16px; height: 16px; }
        body.dashboard-mode .top-card-foot { margin-top: 10px; }
        body.dashboard-mode .amount { font-size: 20px; }
        body.dashboard-mode .quick-card p { margin: 0; font-size: 11.5px; }
        body.dashboard-mode .quick-order-foot { align-self: end; }
        body.dashboard-mode .quick-card .platforms { margin: 0; gap: 10px; }
        body.dashboard-mode .quick-card .platform { width: 28px; height: 28px; border-radius: 9px; }
        body.dashboard-mode .quick-card .platform svg { width: 16px; height: 16px; }
        body.dashboard-mode .metric-grid { gap: 8px; }
        body.dashboard-mode .metric { min-height: 62px; padding: 9px; }
        body.dashboard-mode .metric span:first-child { font-size: 10px; }
        body.dashboard-mode .metric strong { font-size: 15px; margin: 5px 0; }
        body.dashboard-mode .metric .muted,
        body.dashboard-mode .trend { font-size: 9.5px; }
        body.dashboard-mode .chart { height: clamp(120px, 18vh, 190px); margin-top: 5px; }
        body.dashboard-mode .section { padding: 14px 18px; overflow: hidden; }
        body.dashboard-mode .panel-head { margin-bottom: 10px; }
        body.dashboard-mode .panel-head h2 { font-size: 14px; }
        body.dashboard-mode .select { min-height: 30px; padding: 0 11px; font-size: 11px; }
        body.dashboard-mode .order-row { min-height: 44px; gap: 9px; grid-template-columns: 32px 1fr auto 12px; }
        body.dashboard-mode .recent .service-icon,
        body.dashboard-mode .order-row .service-icon { width: 30px; height: 30px; border-radius: 9px; }
        body.dashboard-mode .order-title { font-size: 11.5px; }
        body.dashboard-mode .order-id { font-size: 9.5px; }
        body.dashboard-mode .status { min-height: 20px; min-width: 78px; padding: 4px 7px; font-size: 9.5px; border-radius: 8px; }
        body.dashboard-mode .announcement { min-height: 46px; padding: 0 18px; gap: 12px; }
        body.dashboard-mode .announce-title { font-size: 13px; gap: 8px; }

      @media (max-width: 1280px) {
        .app { grid-template-columns: 250px minmax(0, 1fr); }
        .main { padding: 20px 24px; }
        .two-col, .lower-grid { grid-template-columns: 1fr; }
        .top-grid { grid-template-columns: repeat(2, 1fr); }
        .summary-card { position: static; }
        .category-grid { grid-template-columns: repeat(4, 1fr); }
        .package-grid, .stat-cards { grid-template-columns: repeat(3, 1fr); }
      }

      /* ── Mobile auth logo ───────────────────────────────────── */
      .mobile-auth-logo {
        display: none;
        text-align: center;
        margin-bottom: 24px;
      }
      .mobile-auth-logo img { width: 180px; max-width: 80%; height: auto; }

      @media (max-width: 900px) {
        .mobile-auth-logo { display: block; }
      }

      /* ── Desktop sidebar collapse ────────────────────────────── */
      body.sidebar-collapsed .app { grid-template-columns: 64px minmax(0,1fr); }
      body.sidebar-collapsed .sidebar { padding: 34px 8px 32px; width: 64px; overflow: hidden; }
      body.sidebar-collapsed .logo img,
      body.sidebar-collapsed .nav-label,
      body.sidebar-collapsed .footer-copy { display: none; }
      body.sidebar-collapsed .logo { padding: 0; justify-content: center; height: 44px; }
      body.sidebar-collapsed .nav { gap: 6px; }
      body.sidebar-collapsed .nav-item { grid-template-columns: 1fr; justify-items: center; padding: 0; min-height: 44px; border-radius: 10px; }
      body.sidebar-collapsed .nav-item svg { width: 20px; height: 20px; }

      /* ── Mobile sidebar overlay ─────────────────────────────── */
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.55);
        z-index: 99;
        backdrop-filter: blur(2px);
      }
      body.sidebar-open .sidebar-overlay { display: block; }

      /* ── Language switcher ───────────────────────────────────── */
      .lang-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 5px 11px;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        color: var(--blue-2);
        background: rgba(8,119,255,0.07);
        cursor: pointer;
        letter-spacing: 0.03em;
      }
      .lang-btn:hover { background: rgba(8,119,255,0.13); }

      /* ── Bottom tab bar (mobile only) ───────────────────────── */
      .bottom-nav {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 62px;
        z-index: 100;
        border-top: 1px solid var(--line);
        background: var(--panel);
      }
      .bottom-nav-inner {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        height: 100%;
      }
      .bottom-nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        font-size: 10px;
        font-weight: 600;
        color: var(--muted);
        border: 0;
        background: transparent;
        text-decoration: none;
      }
      .bottom-nav-item svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.85; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .bottom-nav-item.active { color: var(--blue); }
      .bottom-nav-item.active svg { stroke: var(--blue); }

      @media (max-width: 900px) {
        /* Sidebar becomes a slide-in drawer */
        .app { display: block; }
        .sidebar {
          position: fixed;
          top: 0; left: 0;
          height: 100vh;
          width: 270px;
          z-index: 100;
          transform: translateX(-100%);
          transition: transform 0.26s cubic-bezier(.4,0,.2,1);
          box-shadow: 4px 0 28px rgba(0,0,0,0.28);
          overflow-y: auto;
          padding: 28px 18px;
        }
        body.sidebar-open .sidebar { transform: translateX(0); }

        .main {
          height: auto;
          min-height: 100vh;
          padding: 14px 16px 80px;  /* bottom padding for tab bar */
        }
        .topbar {
          height: 54px;
          margin-bottom: 14px;
          padding: 0 2px;
        }
        .top-actions { gap: 14px; }
        /* Hide user name on mobile, keep avatar + balance */
        .user-name, .user .role { display: none; }
        .balance-label { display: none; }
        .balance-value { font-size: 13px; }
        .user { gap: 6px; }
        .balance { gap: 8px; }
        .wallet-icon { width: 26px; height: 26px; }
        .avatar { width: 34px; height: 34px; }

        /* Main content areas */
        .shell { padding: 14px; }
        .content { padding: 0; }
        .hero { min-height: auto; padding: 20px; }
        .hero h1 { font-size: 26px; line-height: 1.2; }
        .hero .actions { flex-direction: column; gap: 10px; }
        .hero .btn { width: 100%; justify-content: center; }
        .hero p { font-size: 14px; }

        /* Grid layouts → single column */
        .top-grid, .lower-grid, .two-col, .three-col, .form-grid { grid-template-columns: 1fr; }
        .auth-page { grid-template-columns: 1fr; padding: 20px; gap: 0; }
        .auth-brand { display: none; }     /* hide brand section on mobile auth */
        .auth-card {
          padding: 28px 22px;
          border-radius: 16px;
          margin: 20px 0;
          max-width: 100%;
        }
        .auth-card h1 { font-size: 24px; }

        /* Metrics + amounts */
        .metric-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-cards { grid-template-columns: repeat(2, 1fr); }
        .amount-grid { grid-template-columns: repeat(2, 1fr); }
        .category-grid { grid-template-columns: repeat(2, 1fr); }
        .package-grid { grid-template-columns: 1fr; }

        /* Service list */
        .service-row { grid-template-columns: 36px 1fr auto; gap: 10px; }
        .service-row-price { display: none; }
        .service-row > .price, .service-row > .btn { justify-self: start; }

        /* Table scroll */
        table { min-width: 700px; }
        .table-card { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .table-tools { grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px; }

        /* Announcement */
        .announcement { grid-template-columns: 1fr; padding: 16px; gap: 10px; }

        /* Filters */
        .filters, .bottom-bar { grid-template-columns: 1fr; }

        /* Page head */
        .page-head { margin-bottom: 14px; }
        .page-head h1 { font-size: 20px; }

        /* Card padding tighter on mobile */
        .card { border-radius: 12px; }
        .section { padding: 16px; }

        /* Show bottom nav */
        .bottom-nav { display: block; }

        /* Smaller wallet card on mobile */
        .wallet-card { min-height: auto; padding: 18px; }
        .wallet-tile { width: 40px; height: 40px; }

        /* Quick card platforms */
        .platforms { gap: 10px; }
        .platform-link .platform { width: 36px; height: 36px; }
      }

      @media (max-width: 480px) {
        .main { padding: 12px 12px 80px; }
        .shell { padding: 12px; }
        .hero { padding: 16px; }
        .hero h1 { font-size: 22px; }
        .metric-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
        .metric { min-height: 80px; padding: 12px; }
        .stat-cards { grid-template-columns: 1fr 1fr; }
        .amount-grid { grid-template-columns: 1fr 1fr; }
        .topbar { height: 50px; }
        .auth-card { padding: 22px 18px; margin: 12px 0; }
        .section { padding: 14px; }
        .page-head h1 { font-size: 18px; }
        .btn { min-height: 42px; font-size: 13px; }
        .field, .select { min-height: 44px; font-size: 14px; }
        .table-tools { grid-template-columns: 1fr; }
      }

      :root {
        --bg: #f6f8fc;
        --panel: #ffffff;
        --panel-2: #f8fbff;
        --panel-3: #eef5ff;
        --line: rgba(23, 55, 105, 0.12);
        --line-strong: rgba(8, 119, 255, 0.28);
        --text: #111827;
        --soft: #475569;
        --muted: #7b8798;
        --shadow: 0 18px 42px rgba(18, 38, 74, 0.08);
      }

      body {

          line-height: 1.3;
        }
        body.app-mode:not(.dashboard-mode) .order-detail-page .refill-card .pill {
          font-size: 9.5px;
        }
        body.app-mode:not(.dashboard-mode) .services-page .table-tools {
          grid-template-columns: minmax(280px, 1fr) 150px 150px auto;
          padding: 14px;
        }
        body.app-mode:not(.dashboard-mode) .services-page .table-foot {
          font-size: 12.5px;
        }
        body.app-mode:not(.dashboard-mode) .other-service-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
          gap: 8px;
        }
        body.app-mode:not(.dashboard-mode) .other-service-card {
          min-height: 58px;
          padding: 9px 10px;
          border-radius: 9px;
        }
        body.app-mode:not(.dashboard-mode) .other-service-card strong {
          font-size: 10.6px;
        }
        body.app-mode:not(.dashboard-mode) .other-service-card span:last-child {
          font-size: 9.4px;
        }
        body.app-mode:not(.dashboard-mode) .compact-service-list .service-row {
          min-height: 52px;
          padding: 7px 10px;
        }
        body.app-mode:not(.dashboard-mode) .compact-service-list .service-name {
          font-size: 10.8px;
        }
        body.app-mode:not(.dashboard-mode) .compact-service-list .service-desc,
        body.app-mode:not(.dashboard-mode) .compact-service-list .pill {
          font-size: 9.4px;
        }
      }
      /* ── Spinner animation ───────────────────────────────────── */
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── New order filter bar ───────────────────────────────── */
      .new-order-filters {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 12px;
      }
      @media (max-width: 600px) { .new-order-filters { grid-template-columns: 1fr; } }

      /* ── Improved service row layout ────────────────────────── */
      .service-row-body { flex: 1; min-width: 0; }
      .service-row-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      .service-row-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
      .service-row-price { text-align: right; white-space: nowrap; flex-shrink: 0; }
      .service-row-price strong { display: block; font-size: 14px; color: var(--blue-2); }

      /* ── Service quality badges ─────────────────────────────── */
      .svc-badge {
        display: inline-block;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 600;
        border-radius: 20px;
        border: 1px solid rgba(8,119,255,.3);
        color: var(--blue);
        background: rgba(8,119,255,.08);
        white-space: nowrap;
      }
      .svc-badge.best { border-color: rgba(255,179,26,.4); color: #b06800; background: rgba(255,179,26,.1); }
      .svc-badge.indo { border-color: rgba(255,0,0,.2); color: #c00; background: rgba(255,0,0,.06); }
      .svc-badge.rec { border-color: rgba(5,217,139,.3); color: #0a8a56; background: rgba(5,217,139,.08); }

      /* ── Package card mobile ────────────────────────────────── */
      @media (max-width: 700px) {
        .package-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      }
      @media (max-width: 480px) {
        .package-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }

      /* ── Payment methods mobile ─────────────────────────────── */
      .payment-methods-grid { max-height: 420px; overflow-y: auto; }
      @media (max-width: 900px) {
        .payment-methods-grid { max-height: 320px; }
      }

      /* ── Payment UI mobile fixes ─────────────────────────────── */
      .pay-group { margin-bottom: 8px; }
      .pay-group-head {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        min-height: 52px;
        padding: 0 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(10,22,44,.7);
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: .15s;
        color: var(--text);
        text-align: left;
      }
      .pay-group-head:hover,
      .pay-group-head.open { border-color: rgba(8,119,255,.4); background: rgba(8,119,255,.07); }
      .pay-group-head.has-selected { border-color: rgba(5,217,139,.5); background: rgba(5,217,139,.06); }
      .pay-group-body { padding: 12px 0 4px; }
      .pay-method-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 10px;
      }
      .pay-method-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 12px 8px;
        min-height: 80px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(10,22,44,.6);
        cursor: pointer;
        transition: .14s;
        position: relative;
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
        text-align: center;
      }
      .pay-method-card:hover { border-color: rgba(8,119,255,.4); }
      .pay-method-card.active { border-color: var(--green); background: rgba(5,217,139,.07); }
      .pay-method-logo { width: 44px; height: 28px; display: flex; align-items: center; justify-content: center; }
      .pay-method-logo img { max-width: 100%; max-height: 100%; object-fit: contain; }
      .pay-method-name { font-size: 11px; font-weight: 700; line-height: 1.3; }
      .pay-method-check {
        position: absolute;
        top: 6px; right: 6px;
        width: 18px; height: 18px;
        border-radius: 50%;
        background: var(--green);
        color: #000;
        display: flex; align-items: center; justify-content: center;
      }
      .pay-method-check svg { width: 11px; height: 11px; stroke-width: 3; }
      .pay-group-arrow { margin-left: auto; flex-shrink: 0; opacity: .6; transition: transform .15s; }
      .pay-group-head.open .pay-group-arrow { transform: rotate(180deg); }
      .payment-icon { opacity: .8; }

      /* Light mode payment */
      body.light-mode .pay-group-head { background: #fff; border-color: rgba(23,55,105,.13); color: #273449; }
      body.light-mode .pay-group-head.open { border-color: rgba(8,119,255,.4); background: #edf6ff; }
      body.light-mode .pay-group-head.has-selected { border-color: rgba(5,217,139,.5); background: #f0fdf8; }
      body.light-mode .pay-method-card { background: #fff; border-color: rgba(23,55,105,.13); color: #273449; }

      /* Mobile payment specifics */
      @media (max-width: 900px) {
        .pay-method-grid { grid-template-columns: repeat(2, 1fr); }
        .pay-group-head { min-height: 48px; font-size: 13px; }
        .amount-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px; }
      }
      @media (max-width: 480px) {
        .pay-method-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .pay-method-card { min-height: 72px; padding: 10px 6px; }
      }

      /* ── Service Discovery UI ───────────────────────────────── */
      .view-toggle {
        display: inline-flex;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .view-toggle-btn {
        padding: 7px 18px;
        font-size: 13px;
        font-weight: 700;
        color: var(--soft);
        background: transparent;
        border: 0;
        cursor: pointer;
        transition: .14s;
        white-space: nowrap;
      }
      .view-toggle-btn.active {
        color: #fff;
        background: var(--blue);
        box-shadow: 0 2px 12px rgba(8,119,255,.28);
      }
      .filter-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
        align-items: center;
      }
      .filter-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 600;
        color: #273449;
        border: 1.5px solid rgba(23,55,105,.14);
        border-radius: 999px;
        background: #ffffff;
        cursor: pointer;
        transition: border-color .14s, box-shadow .14s;
        white-space: nowrap;
        box-shadow: 0 1px 3px rgba(0,0,0,.04);

      .filter-chip:hover { border-color: rgba(8,119,255,.4); }
      .filter-chip.active { color: var(--blue); border-color: var(--blue); background: #edf6ff; }
      .filter-chip select {
        background: transparent;
        border: 0;
        color: inherit;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        outline: none;
        padding: 0;
        max-width: 130px;
      }
      .filter-chip select option { background: #fff; color: #111827; }

      /* Package cards */
      .pkg-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        margin-top: 8px;
      }
      .pkg-card {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 18px;
        border: 1px solid rgba(109,160,255,.22);
        border-radius: 12px;
        background: linear-gradient(145deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        transition: border-color .18s, box-shadow .18s, background .18s;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
      }
      .pkg-card:hover { border-color: rgba(8,119,255,.55); box-shadow: 0 6px 28px rgba(8,119,255,.16); background: linear-gradient(145deg, rgba(8,119,255,.09), rgba(8,119,255,.04)); }
      .pkg-card-icon { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 11px; }
      .pkg-card-title { font-size: 14px; font-weight: 800; color: var(--text); margin: 0; }
      .pkg-card-desc { font-size: 12px; color: var(--soft); line-height: 1.5; margin: 0; flex: 1; }
      .pkg-card-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 4px;
        padding-top: 10px;
        border-top: 1px solid var(--line);
        font-size: 12px;
        gap: 8px;

      .pkg-card-price { color: var(--green); font-weight: 700; }

        position: absolute;

        right: 10px;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 800;
        color: var(--yellow);
        background: rgba(255,179,26,.12);
        white-space: nowrap;
      }

      /* Goal filter grid */
      .goal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 10px;
        margin-bottom: 20px;
      }
      .goal-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 18px 8px 14px;
        border: 1.5px solid rgba(23,55,105,.1);
        border-radius: 14px;
        background: #ffffff;
        cursor: pointer;
        text-align: center;
        font-size: 11.5px;
        font-weight: 700;
        color: #111827;
        transition: border-color .16s, box-shadow .16s, transform .12s;
        box-shadow: 0 1px 4px rgba(0,0,0,.04);

      .goal-card:hover { border-color: var(--blue); box-shadow: 0 4px 14px rgba(8,119,255,.12); transform: translateY(-2px); }

      .goal-card-icon-wrap {

        border-radius: 12px;
        display: grid;
        place-items: center;

      .goal-card-label { font-size: 11px; font-weight: 700; color: #111827; line-height: 1.2; }
      .goal-card-sub { font-size: 9.5px; font-weight: 500; color: #7b8798; line-height: 1.2; }

      .featured-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }
      .featured-card {

        flex-direction: column;
        gap: 10px;
        padding: 16px;
        border: 1px solid rgba(109,160,255,.18);
        border-radius: 12px;
        background: rgba(255,255,255,.04);
        transition: border-color .18s, background .18s;

      .featured-card-head { display: flex; align-items: center; gap: 10px; }

      .featured-card-cat { font-size: 10px; font-weight: 700; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .05em; }
      .featured-card-desc { font-size: 12px; color: var(--soft); line-height: 1.5; margin: 0; flex: 1; }
      .featured-card-foot {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: auto;
        padding-top: 10px;
        border-top: 1px solid var(--line);
        flex-wrap: wrap;

        padding: 2px 7px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;

      .fc-tag.refill { color: #78baff; background: rgba(0,119,255,.12); }
      .fc-tag.cat { color: #c08cff; background: rgba(139,92,246,.12); }

      .discover-head {

        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
        gap: 14px;
      }
      .discover-head h2 { margin: 0; font-size: 17px; }
      .responsible-note {

        padding: 12px 16px;
        border: 1px solid rgba(255,179,26,.2);

        gap: 10px;
        align-items: flex-start;
        line-height: 1.55;

      .empty-featured {
        padding: 40px;
        text-align: center;
        color: var(--muted);
        border: 1px dashed var(--line);
        border-radius: 10px;
        font-size: 14px;
      }

      /* Platform shortcut cards in dashboard */
      .platform-shortcut {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border: 1.5px solid rgba(23,55,105,.1);
        border-radius: 12px;
        background: #ffffff;
        text-decoration: none;
        color: #111827;
        transition: border-color .15s, box-shadow .15s, transform .12s;
        cursor: pointer;
        box-shadow: 0 1px 3px rgba(0,0,0,.04);
      }
      .platform-shortcut:hover { border-color: var(--blue); box-shadow: 0 4px 14px rgba(8,119,255,.1); transform: translateY(-2px); }

      /* Light mode overrides */
      body.light-mode .platform-shortcut { background: #ffffff; border-color: rgba(23,55,105,.1); }
      body.light-mode .platform-shortcut:hover { background: #f8fbff; border-color: var(--blue); }

      body.light-mode .pkg-card:hover { background: #f0f7ff; border-color: rgba(8,119,255,.4); }
      body.light-mode .goal-card { background: #ffffff; border-color: rgba(23,55,105,.1); color: #111827; }
      body.light-mode .goal-card:hover { background: #f8fbff; border-color: var(--blue); }
      body.light-mode .goal-card.active { background: #edf6ff; border-color: var(--blue); }
      body.light-mode .featured-card { background: #fff; border-color: rgba(23,55,105,.13); }
      body.light-mode .featured-card:hover { background: #f7fbff; border-color: rgba(8,119,255,.32); }
      body.light-mode .filter-chip { background: #fff; border-color: rgba(23,55,105,.14); color: #273449; }
      body.light-mode .filter-chip.active { color: var(--blue); border-color: var(--blue); background: #edf6ff; }
      body.light-mode .view-toggle { border-color: rgba(23,55,105,.18); }
      body.light-mode .view-toggle-btn { color: #526174; }
      body.light-mode .filter-chip select option { background: #fff; color: #111827; }

      @media (max-width: 1280px) {
        .pkg-grid { grid-template-columns: repeat(2, 1fr); }
        .goal-grid { grid-template-columns: repeat(3, 1fr); }
        .featured-grid { grid-template-columns: repeat(2, 1fr); }
      }
      @media (max-width: 900px) {
        .pkg-grid { grid-template-columns: 1fr; }
        .goal-grid { grid-template-columns: repeat(2, 1fr); }
        .featured-grid { grid-template-columns: 1fr; }
        .filter-row { gap: 6px; }
      }

        name = name.replace(/\[[^\]]*\]/g, "").trim();
        // Remove trailing noise after pipes or dashes
        name = name.replace(/\s*\|\s*.+$/, "").trim();
        // Remove specific noise words at word boundaries
        name = name.replace(/\b(HQ|Ultra|Elite|Exclusive|V\d+|Cheap|Bot|NonDrop|Non-Drop)\b/gi, "").trim();

      async function apiGet(path) {
        const response = await fetch(path, { headers: { Accept: "application/json" } });
        const text = await response.text();
        let data = {};
        try { data = text ? JSON.parse(text) : {}; } catch { data = { error: text || "API request failed" }; }
        if (!response.ok || data.error) {
          const error = new Error(data.message || data.error || "API request failed");
          error.status = response.status;
          throw error;
        }
        return data;
      }
      async function apiPost(path, payload) {
        const response = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json", Accept: "application/json" },
          body: JSON.stringify(payload)
        });
        const text = await response.text();
        let data = {};
        try { data = text ? JSON.parse(text) : {}; } catch { data = { error: text || "API request failed" }; }
        if (!response.ok || data.error) {
          const error = new Error(data.message || data.error || "API request failed");
          error.status = response.status;
          throw error;
        }
        return data;
      }
      function mapProviderService(item) {
        const rawPlatform = (item.platform || "other").toLowerCase();
        // Normalize platform key: "twitter/x" → "twitter", "website traffic" → "website"
        let platform = PLATFORM_NORM[rawPlatform] || rawPlatform.replace(/[^a-z]/g, "") || "other";
        // Known fixes after stripping special chars
        if (platform === "twitterx") platform = "twitter";
        if (platform === "websitetraffic") platform = "website";
        if (platform === "applemusic") platform = "applemusic";
        // Secondary: detect brand from name when platform is "other"
        if (platform === "other") {
          platform = detectPlatformFromName(item.name) || "other";
        }

        const min = item.min || "100";
        const max = item.max || "100000";
        const retailPrice = Number(item.pricePer1k || item.retailPricePer1k || item.rate || 0);
        return [
          platform,
          item.name || `Service ${item.id || item.service}`,
          `${item.category || "SMMWIZ"}${item.type ? ` • ${item.type}` : ""}`,
          item.type || "",
          "Fast",
          item.refill ? "Refill" : "No Refill",
          Math.max(1, Math.round(retailPrice / 1000)),
          `${Number(min).toLocaleString("id-ID")} - ${Number(max).toLocaleString("id-ID")}`,
          item.id || item.providerServiceId || item.service,
          item.cancel
        ];
      }

      async function syncSmmwiz() {
        if (state.smmwizSynced || location.protocol === "file:") return;
        state.smmwizSynced = true;
        try {
          const [serviceList, balanceData, channelData] = await Promise.all([
            apiGet("/api/services"),
            apiGet("/api/balance"),
            apiGet("/api/payment/channels").catch(() => ({ channels: [] }))
          ]);

          // API returns { total, services: [...] }
          const list = Array.isArray(serviceList) ? serviceList : (serviceList.services || []);
          if (list.length) {
            services.splice(0, services.length, ...list.map(mapProviderService));
            selectService(0);
          }

          // API returns { provider, balance, currency }
          if (balanceData?.balance) {
            state.providerBalance = `${balanceData.balance} ${balanceData.currency || "USD"}`.trim();
          }

          // Store payment channels for topup page
          if (channelData?.channels) state.tripayChannels = channelData.channels;

          // Load real orders + stats if logged in
          if (state.currentUser?.id) {
            loadOrders();
            apiGet("/api/admin/stats").then(s => { state.adminStats = s; render(); }).catch(() => {});
          }

          state.smmwizReady = true;
          render();
        } catch (error) {
          state.smmwizError = error.message;
          render();
        }
      }

      async function loadOrders() {
        if (!state.currentUser?.id) return;
        try {
          const data = await apiGet(`/api/orders?userId=${state.currentUser.id}&limit=20`);
          state.liveOrders = data.orders || [];
          render();
        } catch (_) { /* non-fatal */ }
      }

      async function submitLiveOrder() {
        if (!state.currentUser?.id) {
          state.filterNote = "Silakan login terlebih dahulu.";
          location.hash = "#/login";
          return;
        }
        try {
          const payment = await apiPost("/api/payment/create", {
            userId:        state.currentUser.id,
            serviceId:     state.selectedServiceId,
            quantity:      state.quantity,
            link:          state.link,
            paymentMethod: state.selectedPayment || "QRIS"
          });

          // Redirect to Tripay checkout page
          if (payment.checkoutUrl) {
            state.filterNote = "Invoice Tripay berhasil dibuat. Selesaikan pembayaran untuk melanjutkan order.";
            render();
            setTimeout(() => { location.href = payment.checkoutUrl; }, 800);
            return;
          }

          // Fallback: if paymentId provided, submit order directly
          if (payment.paymentId) {
            const result = await apiPost("/api/orders", {
              serviceId: state.selectedServiceId,
              link:      state.link,
              quantity:  state.quantity,
              paymentId: payment.paymentId
            });
            state.liveOrderId = result.providerOrderId || result.rectoboostOrderId || "";
            state.filterNote = state.liveOrderId
              ? `Order dikirim ke SMMWIZ: #${state.liveOrderId}`
              : "Order berhasil dibuat.";
          }
        } catch (error) {
          state.filterNote = `Error: ${error.message}`;
        }
        location.hash = "#/new-order/success";
      }

        const raw = (name || "other").toLowerCase();

          : key === "websitetraffic" ? "website"
          : key;
        if (brandSymbols.has(finalKey)) return `<span class="${cls} ${finalKey}"><svg viewBox="0 0 24 24"><use href="#brand-${finalKey}"/></svg></span>`;
        return `<span class="${cls} ${finalKey}">${svg(categoryIcons[finalKey] || categoryIcons.other)}</span>`;
      }
