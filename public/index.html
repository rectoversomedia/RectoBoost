          <div class="summary-row"><span>Total Price</span><span class="total">${money(state.price)}</span></div>
        </aside>`;
      }

      function serviceBadge(s) {
        const name = (s[1] || "").toLowerCase();
        const isIndo = name.includes("indonesia") || name.includes("indonesian") || name.includes("[indo]");
        const isFast = (s[4] || "").toLowerCase() === "instant";
        const hasRefill = s[5] === "Refill" || (s[5] || "").includes("Days");
        if (isIndo && hasRefill) return `<span class="svc-badge best">⭐ Best</span>`;
        if (isIndo) return `<span class="svc-badge indo">🇮🇩 Indonesia</span>`;
        if (isFast && hasRefill) return `<span class="svc-badge rec">✓ Recommended</span>`;
        if (hasRefill) return `<span class="svc-badge">Refill</span>`;
        return "";
      }

      function newOrder() {
        const PAGE_SIZE = 15;
        const catOptions = allCategories.filter(c => c !== "all");
        // Get sub-categories available for selected platform
        const platformSvcs = services
          .filter(s => (state.selectedCategory === "all" || s[0] === state.selectedCategory)
            && !NEGATIVE_SVC_WORDS.some(w => s[1].toLowerCase().includes(w))
            && isIndonesiaOrNoCountry(s));
        const subCats = [...new Set(platformSvcs.map(s => getServiceSubCat(s)))].sort();

        const allFiltered = newOrderServices();
        const page = state.newOrderPage || 1;
        const visibleServices = allFiltered.slice(0, page * PAGE_SIZE);
        const hasMore = allFiltered.length > visibleServices.length;

        return layout(`<section class="view shell">${pageHead("New Order")}<div class="grid">${stepper(1)}<div class="two-col"><div class="grid"><article class="card section">
          <h2>1. Pilih Layanan</h2>
          <p class="muted" style="margin-bottom:14px">Pilih platform dan jenis layanan yang kamu butuhkan.</p>

          <div class="new-order-filters">
            <div>
              <label style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block">Platform</label>
              <select class="select" data-new-order-category style="width:100%;min-height:42px;padding:0 12px">
                <option value="all">Semua Platform</option>
                ${catOptions.map(c => `<option value="${c}" ${state.selectedCategory === c ? "selected" : ""}>${categoryLabel(c)}</option>`).join("")}
              </select>
            </div>
            <div>
              <label style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block">Jenis Layanan</label>
              <select class="select" data-new-order-subcat style="width:100%;min-height:42px;padding:0 12px">
                <option value="">Semua Jenis</option>
                ${subCats.map(c => `<option value="${c}" ${state.newOrderSubCat === c ? "selected" : ""}>${c}</option>`).join("")}
              </select>
            </div>
          </div>

          <div class="field" style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
            ${svg('<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>')}
            <input style="border:0;outline:none;background:transparent;color:inherit;font:inherit;width:100%" placeholder="Cari nama layanan..." value="${attr(state.newOrderSearch || "")}" data-new-order-search />
          </div>

          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <span class="muted" style="font-size:13px"><strong style="color:var(--text)">${allFiltered.length.toLocaleString("id-ID")}</strong> layanan tersedia</span>
            ${state.newOrderSubCat || state.newOrderSearch ? `<button class="btn small ghost" data-reset-new-order-filters>Reset Filter</button>` : ""}
          </div>

          <div class="service-list">
            ${visibleServices.length
              ? visibleServices.map(({ s, i }) => serviceRow(s, i, String(s[8]) === String(state.selectedServiceId))).join("")
              : `<div class="empty-state" style="padding:32px;text-align:center"><p>Tidak ada layanan ditemukan. Coba ubah filter atau kategori.</p></div>`}
          </div>
          ${hasMore ? `<div style="text-align:center;margin-top:14px"><button class="btn ghost" data-load-more-services>Tampilkan Lebih Banyak (${allFiltered.length - visibleServices.length} tersisa)</button></div>` : ""}
        </article></div><div class="grid">${orderSummary(!state.selectedServiceId)}${tips()}</div></div></div></section>`);
      }

      function serviceRow(s, index, selected = false) {
        const pricePerK = (s[6] * 1000).toLocaleString("id-ID");
        const cleanName = cleanServiceName(s[1], s[0]);
        const desc = serviceDescription(s[0]);
        const badge = serviceBadge(s);
        const isRefill = s[5] === "Refill" || (s[5] || "").includes("Days");
        return `<div class="service-row ${selected ? "selected" : ""}" style="cursor:pointer" data-service-index="${index}">
          ${brand(s[0])}
          <div class="service-row-body">
            <div class="service-row-top">
              <strong class="service-name">${cleanName}</strong>
              ${badge}
            </div>
            <p class="muted service-desc" style="margin:4px 0 6px;font-size:13px">${desc}</p>
            <div class="service-row-pills">
              <span class="pill">⚡ ${s[4] || "Fast"}</span>
              ${isRefill ? `<span class="pill" style="color:var(--green)">↺ ${s[5]}</span>` : `<span class="pill">No Refill</span>`}
              <span class="pill">Min ${(s[7]||"").split("-")[0].trim()}</span>
            </div>
          </div>
          <div class="service-row-price">
            <strong>IDR ${pricePerK}</strong><br>
            <span class="muted" style="font-size:12px">per 1.000</span>
          </div>
          <button class="btn small primary" data-service-index="${index}">${state.lang==="id"?"Pilih":"Select"}</button>
        </div>`;
      }

      function otherServices() {
        const extraCategories = allCategories.filter((x) => x !== "all" && !mainCategories.includes(x));
        return layout(`<section class="view shell">${pageHead("Other Services", `<a class="btn ghost" href="#/new-order">${svg(icon.back)}Back to Main Categories</a>`)}<div class="two-col"><div class="grid"><article class="card section"><h2>Browse More SMM Services</h2><p class="muted">These categories cover the broader service types commonly available through SMM panel providers.</p><div class="other-service-grid">${extraCategories.map((x) => {
          const count = services.filter((s) => s[0] === x).length;
          return `<a class="card other-service-card" href="#/services" data-service-platform="${x}">${brand(x)}<span><strong>${categoryLabel(x)}</strong><span class="muted">${count || 1} available services</span></span></a>`;
        }).join("")}</div></article><article class="card section"><h2>All Other Services</h2><div class="service-list compact-service-list">${services.map((s, i) => ({ s, i })).filter(({ s }) => !mainCategories.includes(s[0])).slice(0, 10).map(({ s, i }) => serviceRow(s, i)).join("")}</div></article><article class="card section"><h2>Custom Request</h2><p class="muted">If the exact service is not available, send a custom request and the team can add it to the catalog.</p><div class="actions"><a class="btn primary" href="#/tickets/create">${svg(icon.plus)}Request Custom Service</a><a class="btn" href="#/services">${svg(icon.services)}View Full Catalog</a></div></article></div><div class="grid">${orderSummary(true)}<aside class="card section"><h2>How It Works</h2><p>Pick a category to open the full services table with that filter already applied, then choose a service and continue the normal order flow.</p></aside></div></div></section>`);
      }

      function orderDetails() {
        const service = selectedServiceData();
        const tiers = getServicePackageTiers();
        const svcMinRaw = String(service[7] || "100").split("-")[0].trim().replace(/[^0-9]/g,"");
        const svcMin = Number(svcMinRaw) || 100;
        const svcMaxRaw = String(service[7] || "100000").split("-").pop().trim().replace(/[^0-9]/g,"");
        const svcMax = Number(svcMaxRaw) || 100000;
        const cleanName = cleanServiceName(service[1], service[0]);
        const canContinue = state.link.trim().length > 0;
        return layout(`<section class="view shell">${pageHead("New Order")}<div class="grid">${stepper(2)}<div class="two-col"><article class="card section">
          <a class="tag" href="#/new-order">${svg(icon.back)}Kembali ke daftar layanan</a>
          <div style="display:flex;align-items:center;gap:16px;margin:22px 0">
            ${brand(service[0], "platform")}
            <div>
              <h2 style="margin:0 0 4px">${cleanName}</h2>
              <p class="muted" style="margin:0 0 6px;font-size:13px">${serviceDescription(service[0])}</p>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                <span class="pill">⚡ ${service[4] || "Fast"}</span>
                <span class="pill">${service[5] || "No Refill"}</span>
                <span class="pill">Min ${svcMin.toLocaleString("id-ID")} – Max ${svcMax.toLocaleString("id-ID")}</span>
              </div>
            </div>
          </div>
          <h2>1. Pilih Paket</h2>
          <div class="package-grid">
            ${tiers.map((p) => `<button class="package-card ${state.quantity === p.quantity ? "active" : ""}" data-package="${p.quantity}">
              <strong>${p.label}</strong>
              <div class="pkg-price">IDR ${p.pricePerK.toLocaleString("id-ID")}<span>per 1.000</span></div>
              <div class="pkg-total">Total: <strong>${money(p.totalPrice)}</strong></div>
            </button>`).join("")}
          </div>
          <h2 style="margin-top:28px">2. Masukkan Link</h2>
          <div class="field" style="display:flex;align-items:center;gap:12px">
            ${svg(icon.link)}
            <input type="url" class="link-input-field" placeholder="https://..." value="${attr(state.link)}" data-link-input style="flex:1;border:0;outline:none;background:transparent;color:inherit;font:inherit;min-width:0" />
            <button class="btn small ghost" style="white-space:nowrap;flex-shrink:0" data-check-link>Cek Link</button>
          </div>
          ${state.linkChecked ? `<div class="notice" style="margin-top:10px">${svg(icon.check)} Link valid dan siap digunakan.</div>` : `<p class="muted" style="font-size:12px;margin:6px 0 0">Pastikan profil/konten bersifat publik.</p>`}
          <h2 style="margin-top:28px">3. Jumlah</h2>
          <div class="range-row">
            <div class="qty-box">
              <button data-qty-action="-">-</button>
              <strong data-qty-text>${state.quantity.toLocaleString("id-ID")}</strong>
              <button data-qty-action="+">+</button>
            </div>
            <input type="range" min="${svcMin}" max="${Math.min(svcMax, 100000)}" step="50" value="${state.quantity}" data-qty-range />
            <span style="color:var(--blue-2);white-space:nowrap;font-size:13px">Min: ${svcMin.toLocaleString("id-ID")} – Max: ${Math.min(svcMax,100000).toLocaleString("id-ID")}</span>
          </div>
        </article><div class="grid">${orderSummary()}${tips()}</div></div>
        <div class="card bottom-bar">
          <div>${svg(icon.clock)} <span class="muted">Estimasi Waktu</span><br><strong>10 – 60 Menit</strong></div>
          <div><span class="muted">Total Jumlah</span><br><strong>${qtyLabel()}</strong></div>
          <div><span class="muted">Total Harga</span><br><span class="total">${money(state.price)}</span></div>
          ${canContinue
            ? `<a class="btn primary" href="#/new-order/confirm">Lanjutkan ${svg(icon.arrow)}</a>`
            : `<button class="btn primary" disabled style="opacity:.5;cursor:not-allowed" title="Masukkan link terlebih dahulu">Lanjutkan ${svg(icon.arrow)}</button>`}
        </div></div></section>`);
      }

      function confirmOrder(pay = false) {
        const title = pay ? "Pilih Pembayaran" : "Konfirmasi Order";
        const hasPayment = pay && state.selectedPayment;
        return layout(`<section class="view shell">${pageHead("New Order")}<div class="grid">${stepper(pay ? 4 : 3)}
          <div class="two-col"><div class="grid">
          <div class="card announcement"><div class="announce-title">${svg(icon.info)}${pay ? "Pilih metode pembayaran untuk menyelesaikan order." : "Periksa detail order kamu sebelum melanjutkan."}</div><p>Order akan diproses secara otomatis setelah pembayaran berhasil.</p></div>
          <article class="card section"><div class="panel-head"><h2>${title}</h2><a class="btn small ghost" href="#/new-order/details">${svg(icon.back)} Edit Order</a></div>${summaryTable()}${pay ? paymentMethods() : priceBreakdown()}</article>
          <div class="card bottom-bar">
            <a class="btn" href="${pay ? "#/new-order/confirm" : "#/new-order/details"}">${svg(icon.back)}${pay ? "Kembali" : "Edit Order"}</a>
            <span></span><span></span>
            ${pay
              ? (hasPayment
                  ? `<a class="btn primary" href="#/new-order/success" data-submit-live-order>Bayar ${money(state.price)} ${svg(icon.arrow)}</a>`
                  : `<button class="btn primary" disabled style="opacity:.5;cursor:not-allowed">Pilih metode pembayaran dulu</button>`)
              : `<a class="btn primary" href="#/new-order/pay">Konfirmasi &amp; Bayar ${svg(icon.arrow)}</a>`}
          </div></div>
          <div class="grid">${orderSummary()}${tips()}<aside class="card section"><h2>Butuh Bantuan?</h2><p>Tim support kami siap membantu 24/7.</p><a class="btn ghost block" href="#/tickets/create">Buat Tiket</a></aside></div></div></div></section>`);
      }

      function summaryTable() {
        const service = selectedServiceData();
        const cleanName = cleanServiceName(service[1], service[0]);
        const tiers = getServicePackageTiers();
        const tier = tiers.find(p => p.quantity === state.quantity);
        const pricePerK = tier ? `IDR ${tier.pricePerK.toLocaleString("id-ID")} / 1.000` : "-";
        return `<div class="card" style="overflow:hidden">${[
          ["Layanan", `${brand(service[0], "service-icon platform")}<strong>${cleanName}</strong>`],
          ["Paket", selectedPackageLabel()],
          ["Link", state.link ? `<span style="word-break:break-all">${attr(state.link)}</span>` : `<span class="muted">Belum diisi</span>`],
          ["Jumlah", qtyLabel()],
          ["Harga per 1.000", pricePerK],
          ["Total Harga", `<strong style="color:var(--blue-2)">${money(state.price)}</strong>`],
          ["Estimasi Waktu", "10 – 60 Menit"],
          ["Kecepatan", service[4] || "Fast"],
          ["Refill", service[5] || "No Refill"]
        ].map(r => `<div class="detail-row" style="padding:12px 18px"><span class="muted">${r[0]}</span><span style="display:flex;align-items:center;gap:10px;text-align:right;justify-content:flex-end">${r[1]}</span></div>`).join("")}</div>`;
      }

      function priceBreakdown() {
        const afterBalance = state.balance - state.price;
        return `<div class="three-col" style="margin-top:16px">
          <div class="card section"><h2>Rincian Harga</h2>
            <div class="summary-row"><span>Harga Layanan</span><strong>${money(state.price)}</strong></div>
            <div class="summary-row"><span>Jumlah</span><strong>${state.quantity.toLocaleString("id-ID")}</strong></div>
            <div class="summary-row"><span>Total Harga</span><span class="total">${money(state.price)}</span></div>
          </div>
          <div class="card section"><h2>Saldo Kamu</h2>
            <div class="summary-row"><span>Saldo Sekarang</span><strong>${money(state.balance)}</strong></div>
            <div class="summary-row"><span>Setelah Order</span><span class="${afterBalance >= 0 ? "total" : ""}" style="color:${afterBalance < 0 ? "var(--red)" : ""}">${money(afterBalance)}</span></div>
            ${afterBalance < 0 ? `<a class="btn small ghost" href="#/add-funds" style="margin-top:8px">+ Isi Saldo</a>` : `<p class="pill">Saldo mencukupi ✓</p>`}
          </div>
          <div class="card section"><h2>Selanjutnya</h2>
            <p>1. Order akan dikirim<br>2. Proses dimulai otomatis<br>3. Pengiriman dimulai<br>4. Notifikasi saat selesai</p>
          </div>
        </div>`;
      }

      function paymentMethodTypeLabel(type) {
        if (!type) return "Pembayaran";
        const t = type.toLowerCase();
        if (t.includes("virtual") || t.includes("va")) return "Virtual Account";
        if (t.includes("ewallet") || t.includes("e-wallet") || t.includes("wallet")) return "E-Wallet";
        if (t.includes("qris")) return "QRIS";
        if (t.includes("retail") || t.includes("otc")) return "Minimarket";
        return "Bank Transfer";
      }
      function paymentMethods() {
        const channels = (state.tripayChannels || []).filter(ch => ch.is_available !== false && ch.code !== "CC");
        if (!channels.length) {
          return `<div style="margin-top:16px"><h2>2. Pilih Metode Pembayaran</h2><div class="notice" style="margin-top:12px;display:flex;align-items:center;gap:10px">${svg(icon.info)}<span>Memuat metode pembayaran... <button class="btn small ghost" style="margin-left:8px" data-retry-channels>Muat Ulang</button></span></div></div>`;
        }
        return `<div style="margin-top:18px">
          <h2>2. Pilih Metode Pembayaran</h2>
          <div class="payment-methods-grid" style="display:grid;gap:10px;margin-top:12px">
            ${channels.map(ch => `
              <button class="method-row ${state.selectedPayment === ch.code ? "active" : ""}" data-payment="${attr(ch.code)}">
                ${state.selectedPayment === ch.code ? svg(icon.check) : "<span></span>"}
                <span class="payment-icon">
                  ${ch.icon_url ? `<img src="${attr(ch.icon_url)}" alt="${attr(ch.name)}" style="width:28px;height:28px;object-fit:contain;border-radius:4px" loading="lazy"/>` : svg(icon.wallet)}
                </span>
                <span>
                  <strong>${ch.name}</strong>
                  <br><span class="muted" style="font-size:12px">${paymentMethodTypeLabel(ch.group || ch.type)}</span>
                </span>
                <span>${state.selectedPayment === ch.code ? `<span class="pill" style="color:var(--green)">✓ Dipilih</span>` : "&rsaquo;"}</span>
              </button>
            `).join("")}
          </div>
        </div>`;
      }

      function success() {
        state.balance = 2470500;
        return layout(`<section class="view shell">${pageHead("Payment Successful")}<div class="two-col"><div class="grid"><article class="card section" style="text-align:center;padding:42px">${svg(icon.check, "circle-icon")}<h1>Thank You!<br><span style="color:var(--blue-2)">Payment Successful</span></h1><p>Your order has been placed and is now being processed. You will be notified once your order is completed.</p><div class="info-grid"><div class="info-tile">Order ID<br><strong>RB2505180001</strong></div>${state.liveOrderId ? `<div class="info-tile">SMMWIZ Order ID<br><strong>${state.liveOrderId}</strong></div>` : ""}<div class="info-tile">Payment ID<br><strong>PAY250518A7B2</strong></div><div class="info-tile">Transaction Time<br><strong>18 May 2026, 14:32 WIB</strong></div><div class="info-tile">Payment Method<br><strong>Balance</strong></div></div></article><article class="card section"><h2>Order Progress</h2><div class="timeline"><div class="timeline-item"><span class="circle-icon">${svg(icon.check)}</span><strong>Order Placed<br><span class="muted">18 May 2026, 14:32</span></strong><span>Your order has been placed successfully.</span></div><div class="timeline-item"><span class="circle-icon">2</span><strong>Processing<br><span class="muted">Just now</span></strong><span>Your system is preparing the order right now.</span></div></div></article><div class="card bottom-bar"><a class="btn" href="#/orders">${svg(icon.list)}View Orders</a><a class="btn" href="#/new-order">${svg(icon.order)}Create New Order</a><span></span><a class="btn primary" href="#/dashboard">Back to Dashboard</a></div></div><div class="grid">${orderSummary()}<aside class="card section"><h2>What's Next?</h2><p>You will be notified once the order starts. You can check real-time status in the Orders section.</p></aside></div></div></section>`);
      }

      function ordersPage(detail = false) {
        if (detail) return orderDetailsPage();
        const liveOrders = state.liveOrders || [];
        const emptyMsg = state.lang === "id"
          ? "Belum ada order. Order yang kamu buat akan muncul di sini."
          : "No orders yet. Orders you place will appear here.";

        return layout(`<section class="view shell">
          ${pageHead(t("orders"))}
          <div class="grid">
            <article class="card table-card">
              <div class="table-tools">
                <input class="field" placeholder="${state.lang==="id"?"Cari Order ID / Link...":"Search Order ID / Link..."}" />
                <button class="select" data-filter-note="Filter">All Status</button>
                <button class="btn small ghost" data-refresh-orders>${svg('<path d="M3 12a9 9 0 0 1 15-6.7"/><path d="M18 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7"/><path d="M6 21v-5h5"/>')} ${state.lang==="id"?"Refresh":"Refresh"}</button>
              </div>
              <table style="min-width:750px">
                <thead>
                  <tr>
                    <th>Order ID</th>
                    <th>${t("service")}</th>
                    <th>Link</th>

                    <th style="text-align:center">${t("status")}</th>
                    <th>${t("date")}</th>
                    <th style="text-align:center">Action</th>
                  </tr>
                </thead>
                <tbody>
                  ${liveOrders.length
                    ? liveOrders.map(o => `<tr>
                        <td style="color:var(--blue-2);font-weight:700">${o.id}</td>
                        <td>
                          <div style="display:flex;align-items:center;gap:10px">
                            ${brand(detectPlatformFromName(o.serviceName||"")||"other","service-icon platform")}
                            <div><strong style="display:block;line-height:1.3">${(o.serviceName||"").slice(0,40)}${(o.serviceName||"").length>40?"…":""}</strong>
                            <span class="muted" style="font-size:12px">${o.serviceCategory||""}</span></div>
                          </div>
                        </td>
                        <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><span class="muted" title="${attr(o.link||"")}">${o.link||"-"}</span></td>
                        <td style="text-align:center">${(o.quantity||0).toLocaleString("id-ID")}</td>

                        <td style="font-size:12px;color:var(--muted)">${o.createdAt ? new Date(o.createdAt).toLocaleDateString("id-ID",{day:"2-digit",month:"short",year:"numeric"}) : "-"}</td>
                        <td style="text-align:center;white-space:nowrap">
                          ${o.status !== "COMPLETED" && o.status !== "CANCELED" && o.status !== "FAILED"
                            ? `<button class="btn small ghost" data-refill-order="${attr(o.id)}" title="Refill">${svg(icon.shield)}</button> `

                          <button class="btn small ghost" style="color:var(--red)" data-delete-order="${attr(o.id)}" title="Delete">${svg('<path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/>')}</button>
                        </td>
                      </tr>`).join("")
                    : `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">${emptyMsg}</td></tr>`
                  }
                </tbody>
              </table>
              <div class="table-foot">
                <span>${state.lang==="id"?"Menampilkan":"Showing"} ${liveOrders.length} ${state.lang==="id"?"order":"orders"}</span>
              </div>
            </article>
          </div>
        </section>`);
      }

      function paginationBar(current, total, dataAttr = "data-svc-page") {
        if (total <= 1) return "";
        const pages = [];
        // Always show: 1, prev-1, current, next+1, last
        const show = new Set([1, total]);
        for (let p = Math.max(1, current - 1); p <= Math.min(total, current + 1); p++) show.add(p);
        let prev = 0;
        const sorted = [...show].sort((a, b) => a - b);
        for (const p of sorted) {
          if (prev && p - prev > 1) pages.push(`<span style="color:var(--muted);padding:0 4px">…</span>`);
          pages.push(`<button class="page-btn ${p === current ? "active" : ""}" ${dataAttr}="${p}">${p}</button>`);
          prev = p;
        }
        return `<div class="pages">${pages.join("")}</div>`;
      }

      async function submitTopup() {
        if (!state.currentUser?.id) {
          state.filterNote = state.lang === "id" ? "Silakan login terlebih dahulu." : "Please login first.";
          location.hash = "#/login"; return;
        }
        if (!state.topupMethod) {
          state.filterNote = state.lang === "id" ? "Pilih metode pembayaran terlebih dahulu." : "Please select a payment method.";
          render(); return;
        }
        try {
          state.filterNote = state.lang === "id" ? "Membuat invoice..." : "Creating invoice...";
          render();
          const res = await apiPost("/api/payment/topup", {
            userId:        state.currentUser.id,
            amount:        state.topupAmount,
            bonusAmount:   topupBonus(),
            paymentMethod: state.topupMethod,
          });
          if (res.reference) {
            state.pendingPayment = res;
            try { sessionStorage.setItem("rb_pending_pay", JSON.stringify(res)); } catch {}
            state.filterNote = "";
            location.hash = "#/add-funds/pay";
          } else {
            state.filterNote = state.lang === "id" ? "Gagal membuat invoice. Coba lagi." : "Failed to create invoice. Try again.";
            render();
          }
        } catch (e) {
          state.filterNote = e.message;
          render();
        }
      }

      function addFunds() {
        const amounts = [50000,100000,200000,500000,1000000,2000000];
        const channels = state.tripayChannels || [];

        // Channel icon map
        const channelIcon = (code) => {
          const c = (code||"").toLowerCase();
          if (c.includes("qris"))          return icon.qr;
          if (c.includes("va") || c.includes("bca") || c.includes("bni") || c.includes("bri") || c.includes("mandiri") || c.includes("permata")) return icon.bank;
          if (c.includes("ovo") || c.includes("dana") || c.includes("gopay") || c.includes("shopeepay") || c.includes("wallet")) return icon.wallet;
          if (c.includes("alfamart") || c.includes("indomaret")) return icon.order;
          return icon.card;
        };

        const catDef = [
          { key: "va",       label: state.lang==="id"?"Virtual Account":"Virtual Account",  icon: icon.bank,   match: c => /VA|BNI|BRI|MANDIRI|BCA|PERMATA/i.test(c) },
          { key: "qris",     label: "QRIS",                                                  icon: icon.qr,     match: c => /QRIS/i.test(c) },
          { key: "ewallet",  label: "E-Wallet",                                              icon: icon.wallet, match: c => /OVO|DANA|SHOPEEPAY|GOPAY/i.test(c) },
          { key: "minimart", label: state.lang==="id"?"Minimarket":"Minimarket",             icon: icon.order,  match: c => /ALFAMART|INDOMARET/i.test(c) },
        ];
        const active = channels.filter(c => c.active !== false);
        const grouped = catDef.map(cat => ({
          ...cat,
          items: active.filter(c => cat.match(c.code))
        })).filter(g => g.items.length > 0);

        const methodRows = active.length
          ? grouped.map(g => {
              const isOpen = state.topupCategory === g.key;
              const hasSelected = g.items.some(c => c.code === state.topupMethod);
              return `
                <div class="pay-group">
                  <button class="pay-group-head ${isOpen?"open":""} ${hasSelected?"has-selected":""}" data-toggle-category="${g.key}">

      function addFundsPay() {
        const p = state.pendingPayment;
        const id = state.lang === "id";
        if (!p) { location.hash = "#/add-funds"; return ""; }

        const method = (p.method || "").toUpperCase();
        const isQris = method.includes("QRIS");
        const isEwallet = ["OVO","DANA","SHOPEEPAY"].some(e => method.includes(e));
        const isVA = method.includes("VA") || ["BNI","BRI","MANDIRI","BCA","PERMATA"].some(b => method.includes(b));
        const isMini = ["ALFAMART","INDOMARET"].some(m => method.includes(m));

        const expiryDate = p.expiredAt ? new Date(p.expiredAt).toLocaleString("id-ID",{day:"2-digit",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit",timeZone:"Asia/Jakarta"}) + " WIB" : "-";

        const qrSection = isQris && p.qrString ? `
          <div style="display:flex;flex-direction:column;align-items:center;gap:16px;margin:24px 0">
            <div style="background:#fff;border-radius:16px;padding:16px;display:inline-block;box-shadow:0 4px 24px rgba(0,0,0,.18)">
              <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(p.qrString)}" width="220" height="220" alt="QR Code" style="display:block;border-radius:8px" />
            </div>
            <p class="muted" style="font-size:13px;text-align:center">${id?"Scan QR ini dengan aplikasi e-wallet / mobile banking kamu":"Scan this QR with your e-wallet or mobile banking app"}</p>
          </div>` : "";

        const vaSection = (isVA || isMini) && p.payCode ? `
          <div style="margin:24px 0">
            <p class="muted" style="font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">${isMini?(id?"Kode Pembayaran":"Payment Code"):(id?"Nomor Virtual Account":"Virtual Account Number")}</p>
            <div style="display:flex;align-items:center;gap:10px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px 16px">

            <p class="muted" style="font-size:12px;margin-top:8px">${id?"Akan membuka aplikasi e-wallet kamu":"Will open your e-wallet app"}</p>
          </div>` : "";

        const refRow = `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--line)">
            <span class="muted" style="font-size:13px">${id?"No. Referensi":"Reference No."}</span>
            <div style="display:flex;align-items:center;gap:8px">
              <code style="font-size:13px;background:var(--panel-2);padding:4px 8px;border-radius:6px">${p.reference}</code>
              <button class="btn small ghost" data-copy="${attr(p.reference)}">${id?"Salin":"Copy"}</button>
            </div>
          </div>`;

        return layout(`
          <section class="view shell">
            ${pageHead(id?"Instruksi Pembayaran":"Payment Instructions", `<a class="btn ghost" href="#/add-funds">${svg(icon.back)}${id?"Kembali":"Back"}</a>`)}
            <div style="max-width:520px;margin:0 auto">
              <article class="card section" style="text-align:center;padding:32px 28px">
                <div style="display:inline-flex;align-items:center;gap:8px;background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:6px 16px;margin-bottom:20px">
                  <span style="font-size:13px;font-weight:700">${p.method}</span>
                </div>
                <div style="font-size:32px;font-weight:800;letter-spacing:-.02em">${money(p.amount)}</div>
                <p class="muted" style="font-size:13px;margin:6px 0 0">${id?"Nominal yang harus dibayarkan":"Amount to pay"}</p>

                ${qrSection}${vaSection}${ewalletSection}

                ${refRow}
                <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--line)">
                  <span class="muted" style="font-size:13px">${id?"Batas Waktu":"Pay Before"}</span>
                  <strong style="font-size:13px;color:var(--orange)">${expiryDate}</strong>
                </div>

                <button class="btn primary block" style="margin-top:20px" data-check-payment-status="${attr(p.paymentId)}">
                  ${svg(icon.check)} ${id?"Saya Sudah Bayar":"I've Paid — Check Status"}

e answer you're looking for? Our support team is available 24/7.</p><a class="btn primary block" href="#/tickets/create">Create New Ticket</a></div><div class="card section"><h2>Quick Tips</h2><p>Provide your Order ID, describe your issue clearly, and attach screenshots when possible.</p></div></aside></div></div></section>`);

      function reports() {
        const s = state.adminStats;
        const liveOrders = state.liveOrders || [];
        const byStatus = s?.ordersByStatus || {};
        const totalOrders = s?.totalOrders || 0;
        const revenue = s?.revenue?.amount || 0;
        const activeServices = s?.activeServices || 0;
        const hasOrders = totalOrders > 0;
        const id = state.lang === "id";

        // Donut percentages
        const completed  = byStatus.COMPLETED  || 0;
        const processing = byStatus.PROCESSING || 0;
        const pending    = byStatus.PENDING    || 0;
        const pctComp    = totalOrders ? Math.round(completed  / totalOrders * 100) : 0;
        const pctProc    = totalOrders ? Math.round(processing / totalOrders * 100) : 0;
        const pctPend    = totalOrders ? Math.round(pending    / totalOrders * 100) : 0;

        return layout(`
          <section class="view shell reports-page">
            ${pageHead(id?"Laporan":"Reports", `<button class="btn ghost" data-export-report>${id?"Export Laporan":"Export Report"}</button>`)}
            <div class="grid">
              ${state.reportExported ? `<div class="notice">${svg(icon.check)} ${id?"Laporan berhasil diekspor.":"Report exported."}</div>` : ""}
              <div class="stat-cards">
                ${[
                  [id?"Total Order":"Total Orders",   totalOrders.toLocaleString("id-ID"),   ""],
                  [id?"Total Pendapatan":"Total Revenue", "IDR " + revenue.toLocaleString("id-ID"), ""],
                  [id?"Layanan Aktif":"Active Services",  activeServices.toLocaleString("id-ID"),  ""],
                  [id?"Avg Order Value":"Avg Order Value", totalOrders ? "IDR " + Math.round(revenue/totalOrders).toLocaleString("id-ID") : "IDR 0", ""],
                ].map(([label, val]) => `
                  <article class="card mini-stat">
                    <span class="muted">${label}</span>
                    <strong style="display:block;margin:10px 0;font-size:22px">${val}</strong>
                  </article>`).join("")}
              </div>

              <div class="two-col">
                <article class="card section">
                  <h2>${id?"Ringkasan Order":"Orders Overview"}</h2>
                  ${hasOrders ? chart() : `<div style="padding:32px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:8px;margin-top:16px">${id?"Belum ada order.":"No orders yet."}</div>`}
                </article>
                <article class="card section">
                  <h2>${id?"Status Order":"Order Status"}</h2>
                  ${hasOrders
                    ? `<div class="donut" style="--pct-comp:${pctComp}%;--pct-proc:${pctProc}%;--pct-pend:${pctPend}%"></div>
                       <div class="summary-row"><span>${id?"Selesai":"Completed"}</span><strong>${completed} (${pctComp}%)</strong></div>
                       <div class="summary-row"><span>${id?"Diproses":"Processing"}</span><strong>${processing} (${pctProc}%)</strong></div>
                       <div class="summary-row"><span>${id?"Menunggu":"Pending"}</span><strong>${pending} (${pctPend}%)</strong></div>`
                    : `<div style="padding:32px;text-align:center;color:var(--muted)">${id?"Belum ada data order.":"No order data yet."}</div>`}
                </article>

              <article class="card table-card">
                <table>
                  <thead><tr><th>#</th><th>${id?"Layanan":"Service"}</th><th>${id?"Kategori":"Category"}</th><th>${id?"Order":"Orders"}</th><th>${id?"Jumlah":"Quantity"}</th><th>${id?"Total":"Total"}</th></tr></thead>
                  <tbody>
                    ${liveOrders.length
                      ? liveOrders.slice(0,10).map((o,i) => `
                          <tr>
                            <td>${i+1}</td>
                            <td><div class="service-cell">${brand(detectPlatformFromName(o.serviceName||"")||"other","service-icon platform")}<span>${(o.serviceName||"").slice(0,50)}</span></div></td>
                            <td>${o.serviceCategory||"-"}</td>

                  </tbody>
                </table>
              </article>
            </div>
          </section>`);

      function render() {
        const r = route();
        const legalRoutes = ["terms","privacy","refund","contact"];
        const publicRoutes = ["login", "signup", "forgot", "reset-sent", "reset", ...legalRoutes];
        if (!state.isAuthenticated && !publicRoutes.includes(r)) {
          location.hash = "#/login";
          return;
        }
        if (state.isAuthenticated && r === "login") {
          location.hash = "#/dashboard";
          return;
        }
        let html = "";
        if (r === "dashboard") html = dashboard();
        else if (r === "new-order") html = newOrder();
        else if (r === "new-order/others") html = otherServices();
        else if (r === "new-order/details") html = orderDetails();
        else if (r === "new-order/confirm") html = confirmOrder(false);
        else if (r === "new-order/pay") html = confirmOrder(true);
        else if (r === "new-order/success") html = success();
        else if (r === "orders") { html = ordersPage(false); if (!state.liveOrders.length) loadOrders(); }
        else if (r.startsWith("orders/")) html = ordersPage(true);
        else if (r === "services/featured") html = featuredServicesPage();
        else if (r === "services") html = servicesPage();
        else if (r === "add-funds") html = addFunds();
        else if (r === "add-funds/pay") html = addFundsPay();
        else if (r === "add-funds/success") html = addFundsSuccess();
        else if (r === "tickets") html = ticketsPage();
        else if (r === "tickets/create") html = ticketsPage("create");
        else if (r.startsWith("tickets/")) html = ticketsPage(r.split("/")[1]);
        else if (r === "reports") html = reports();
        else if (r === "settings") html = settings();
        else if (r === "notifications") html = notificationsPage();
        else if (r === "faq") html = faq();
        else if (r === "reset") html = resetPage();
        else if (r === "terms")   html = termsPage();
        else if (r === "privacy") html = privacyPage();
        else if (r === "refund")  html = refundPage();
        else if (r === "contact") html = contactPage();
        else if (["login","signup","forgot","reset-sent"].includes(r)) html = auth(r);
        else html = dashboard();
        document.getElementById("root").innerHTML = html;
        document.title = {
          terms: "Syarat & Ketentuan — RectoBoost",
          privacy: "Kebijakan Privasi — RectoBoost",
          refund: "Kebijakan Refund — RectoBoost",
          contact: "Kontak Support — RectoBoost",
        }[r] || "RectoBoost Dashboard";
        window.scrollTo(0, 0);
      }

      document.addEventListener("click", (event) => {
        // Hamburger — open sidebar
        if (event.target.closest("[data-toggle-sidebar]")) {
          event.preventDefault();
          if (window.innerWidth >= 768) {
            document.body.classList.toggle("sidebar-collapsed");
            localStorage.setItem("sb_collapsed", document.body.classList.contains("sidebar-collapsed") ? "1" : "0");
          } else {
            document.body.classList.toggle("sidebar-open");
          }
          return;
        }

        // Overlay / nav link — close sidebar
        if (event.target.closest("[data-close-sidebar]")) {
          document.body.classList.remove("sidebar-open");
        }

        // Language toggle
        if (event.target.closest("[data-toggle-lang]")) {
          event.preventDefault();
          state.lang = state.lang === "id" ? "en" : "id";
          localStorage.setItem("rectoboost_lang", state.lang);
          render();
          return;
        }

        if (event.target.closest("[data-auth-demo]")) {
          event.preventDefault();
          state.loginError = "Gunakan email dan password yang terdaftar.";
          render();
          return;
        }

        // Password visibility toggle
        if (event.target.closest("[data-pw-toggle]")) {
          const btn   = event.target.closest("[data-pw-toggle]");
          const input = btn.closest(".pw-wrap").querySelector("input");
          const show  = input.type === "password";
          input.type  = show ? "text" : "password";
          const eyeOpen  = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
          const eyeClosed = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
          btn.innerHTML = show ? eyeClosed : eyeOpen;
          return;
        }

        // Payment category accordion
        const catHead = event.target.closest("[data-toggle-category]");
        if (catHead) {
          event.preventDefault();
          const key = catHead.dataset.toggleCategory;
          state.topupCategory = state.topupCategory === key ? null : key;
          render();
          return;
        }

        // Copy to clipboard
        const copyBtn = event.target.closest("[data-copy]");
        if (copyBtn) {
          event.preventDefault();
          navigator.clipboard.writeText(copyBtn.dataset.copy).then(() => {
            const orig = copyBtn.innerHTML;
            copyBtn.textContent = state.lang === "id" ? "Tersalin!" : "Copied!";
            setTimeout(() => { copyBtn.innerHTML = orig; }, 1800);
          });
          return;
        }

        // Check payment status
        const checkBtn = event.target.closest("[data-check-payment-status]");
        if (checkBtn) {
          event.preventDefault();
          const paymentId = checkBtn.dataset.checkPaymentStatus;
          const orig = checkBtn.innerHTML;
          const id = state.lang === "id";
          checkBtn.disabled = true;
          checkBtn.innerHTML = `<span style="display:inline-flex;align-items:center;gap:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.2-8.6"/></svg>${id?"Memverifikasi...":"Verifying..."}</span>`;
          apiGet(`/api/payment/status?paymentId=${encodeURIComponent(paymentId)}`)
            .then(res => {
              if (res.status === "PAID") {
                state.balance = res.balance || state.balance;
                state.pendingPayment = null;
                try { sessionStorage.removeItem("rb_pending_pay"); } catch {}
                if (state.currentUser) {
                  state.currentUser.balance = state.balance;
                  localStorage.setItem("rectoboost_user", JSON.stringify(state.currentUser));
                }
                location.hash = "#/add-funds/success";
              } else if (res.status === "EXPIRED") {
                state.pendingPayment = null;
                try { sessionStorage.removeItem("rb_pending_pay"); } catch {}
                checkBtn.disabled = false;
                checkBtn.innerHTML = orig;
                state.filterNote = id
                  ? "Invoice sudah kadaluarsa. Silakan buat top up baru."
                  : "Invoice expired. Please create a new top up.";
                render();
              } else {
                checkBtn.disabled = false;
                checkBtn.innerHTML = orig;
                state.filterNote = id
                  ? "Pembayaran belum terkonfirmasi. Tunggu beberapa menit lalu coba lagi, atau hubungi support jika sudah lebih dari 30 menit."
                  : "Payment not confirmed yet. Wait a few minutes then try again, or contact support if it's been over 30 minutes.";
                render();
              }
            })
            .catch((err) => {
              checkBtn.disabled = false;
              checkBtn.innerHTML = orig;
              state.filterNote = err.message || (id ? "Gagal cek status. Coba lagi." : "Status check failed. Try again.");
              render();
            });
          return;
        }

        // Preference toggle
        const prefBtn = event.target.closest("[data-toggle-pref]");
        if (prefBtn) {
          const key = prefBtn.dataset.togglePref;
          state.settingsPrefs[key] = !state.settingsPrefs[key];
          localStorage.setItem("rectoboost_prefs", JSON.stringify(state.settingsPrefs));
          render();
          return;
        }

        // Continue with Google
        if (event.target.closest("[data-google-login]")) {
          event.preventDefault();
          window.location.href = "/api/auth/google";
          return;
        }

        // Topup submit
        if (event.target.closest("[data-submit-topup]")) {
          event.preventDefault();
          submitTopup();
          return;
        }

        // Refresh orders list
        if (event.target.closest("[data-refresh-orders]")) {
          event.preventDefault();
          loadOrders();
          return;
        }

        // Retry payment channels
        if (event.target.closest("[data-retry-channels]")) {
          event.preventDefault();
          apiGet("/api/payment/channels")
            .then(d => { state.tripayChannels = d.channels || []; render(); })
            .catch(() => { render(); });
          return;
        }

        // Delete order
        const deleteBtn = event.target.closest("[data-delete-order]");
        if (deleteBtn) {
          event.preventDefault();
          const orderId = deleteBtn.dataset.deleteOrder;
          if (!confirm(state.lang === "id" ? `Hapus order ${orderId}?` : `Delete order ${orderId}?`)) return;
          apiPost("/api/orders/delete", { orderId })
            .then(() => { loadOrders(); })
            .catch(e => { state.filterNote = e.message; render(); });
          return;
        }

        // Refill order
        const refillBtn = event.target.closest("[data-refill-order]");
        if (refillBtn) {
          event.preventDefault();
          const orderId = refillBtn.dataset.refillOrder;
          const btn = refillBtn;
          btn.disabled = true;
          apiPost("/api/orders/refill", { orderId })
            .then(() => {
              state.filterNote = state.lang === "id"
                ? `Refill untuk order ${orderId} berhasil dikirim.`
                : `Refill for order ${orderId} submitted successfully.`;
              render();
            })
            .catch(e => {
              state.filterNote = e.message;
              render();
            })
            .finally(() => { btn.disabled = false; });
          return;
        }

        if (event.target.closest("[data-submit-live-order]")) {
          event.preventDefault();
          submitLiveOrder();
          return;
        }

        const platformLink = event.target.closest("[data-service-platform]");
        if (platformLink) {
          event.preventDefault();
          setServiceFilter(platformLink.dataset.servicePlatform, "");
          location.hash = "#/services";
          render();
          return;
        }

        // Services pagination
        const pageBtn = event.target.closest("[data-svc-page]");
        if (pageBtn) {
          event.preventDefault();
          state.servicesPage = Number(pageBtn.dataset.svcPage);
          render();
          // Scroll table into view
          setTimeout(() => document.querySelector(".services-page")?.scrollIntoView({ behavior: "smooth", block: "start" }), 50);
          return;
        }

        const serviceButton = event.target.closest("[data-service-index]");
        if (serviceButton) {
          event.preventDefault();
          selectService(serviceButton.dataset.serviceIndex);
          location.hash = "#/new-order/details";
          return;
        }

        const categoryButton = event.target.closest("[data-category]");
        if (categoryButton) {
          event.preventDefault();
          state.selectedCategory = categoryButton.dataset.category;
          render();
          return;
        }

        // Service view mode toggle (Recommended / All Services)
        const modeBtn = event.target.closest("[data-svc-mode]");
        if (modeBtn) {
          event.preventDefault();
          state.serviceViewMode = modeBtn.dataset.svcMode;
          localStorage.setItem("rb_svc_mode", state.serviceViewMode);
          state.servicesPage = 1;
          render();
          return;
        }

        // Goal filter (services page + featured page)
        const goalBtn = event.target.closest("[data-goal-filter]");
        if (goalBtn) {
          event.preventDefault();
          state.goalFilter = goalBtn.dataset.goalFilter;
          render();
          return;
        }

        // Dashboard goal card → go to services with filter
        const dashGoalBtn = event.target.closest("[data-dash-goal]");
        if (dashGoalBtn) {
          event.preventDefault();
          state.goalFilter = dashGoalBtn.dataset.dashGoal;
          state.serviceViewMode = "recommended";
          location.hash = "#/services";
          render();
          return;
        }

        // Refill filter toggle label click
        const refillLabel = event.target.closest("label[class*='filter-chip']");
        if (refillLabel) {
          const cb = refillLabel.querySelector("[data-refill-filter]");
          if (cb) {
            event.preventDefault();
            state.refillFilter = !state.refillFilter;
            render();
            return;
          }
        }

        const amountButton = event.target.closest("[data-amount]");
        if (amountButton) {
          event.preventDefault();
          state.topupAmount = Number(amountButton.dataset.amount);
          render();
          return;
        }

        const topupMethodButton = event.target.closest("[data-topup-method]");
        if (topupMethodButton) {
          event.preventDefault();
          state.topupMethod = topupMethodButton.dataset.topupMethod;
          state.topupCategory = null; // close accordion after selection
          render();
          return;
        }

        const paymentButton = event.target.closest("[data-payment]");
        if (paymentButton) {
          event.preventDefault();
          state.selectedPayment = paymentButton.dataset.payment;
          render();
          return;
        }

        if (event.target.closest("[data-check-link]")) {
          event.preventDefault();
          state.linkChecked = true;
          render();
          return;
        }

        if (event.target.closest("[data-export-report]")) {
          event.preventDefault();
          state.reportExported = true;
          render();
          return;
        }

        if (event.target.closest("[data-export-orders]")) {
          event.preventDefault();
          state.ordersExported = true;
          render();
          return;
        }

        if (event.target.closest("[data-refresh-status]")) {
          event.preventDefault();
          state.statusRefreshed = true;
          render();
          return;
        }

        if (event.target.closest("[data-save-settings]")) {
          event.preventDefault();
          state.settingsSaved = true;
          render();
          return;
        }
        if (event.target.closest("[data-mark-notifications]")) {
          event.preventDefault();
          state.notificationsRead = true;
          render();
          return;
        }

        if (event.target.closest("[data-logout]")) {
          event.preventDefault();
          state.isAuthenticated = false;
          state.currentUser = null;
          state.balance = 0;
          state.liveOrders = [];
          state.loginError = "";
          localStorage.removeItem("rectoboost_user");
          location.hash = "#/login";
          return;
        }

        if (event.target.closest("[data-security-update]")) {
          event.preventDefault();
          state.securityUpdated = true;
          render();
          return;
        }

        if (event.target.closest("[data-send-reply]")) {
          event.preventDefault();
          state.ticketReplied = true;
          render();
          return;
        }

        const filterButton = event.target.closest("[data-filter-note]");
        if (filterButton) {
          event.preventDefault();
          if (filterButton.closest(".auth-card")) {
            location.hash = "#/dashboard";
            return;
          }
          state.filterNote = filterButton.dataset.filterNote;
          render();
          return;
        }

        if (event.target.closest("[data-reset-new-order-filters]")) {
          event.preventDefault();
          state.newOrderSubCat = "";
          state.newOrderSearch = "";
          state.newOrderPage = 1;
          render();
          return;
        }

        if (event.target.closest("[data-load-more-services]")) {
          event.preventDefault();
          state.newOrderPage = (state.newOrderPage || 1) + 1;
          render();
          return;
        }

        const packageButton = event.target.closest("[data-package]");
        if (packageButton) {
          event.preventDefault();
          setQuantity(packageButton.dataset.package);
          render();
          return;
        }

        const qtyButton = event.target.closest("[data-qty-action]");
        if (qtyButton) {
          event.preventDefault();
          const delta = qtyButton.dataset.qtyAction === "+" ? 100 : -100;
          setQuantity(state.quantity + delta);
          render();
        }
      });

      document.addEventListener("input", (event) => {
        if (event.target.matches("[data-service-search]")) {
          state.serviceSearch = event.target.value;
          state.servicesPage = 1;
          render();
          const input = document.querySelector("[data-service-search]");
          if (input) {
            input.focus();
            input.setSelectionRange(input.value.length, input.value.length);
          }
          return;
        }

        if (event.target.matches("[data-new-order-search]")) {
          state.newOrderSearch = event.target.value;
          state.newOrderPage = 1;
          render();
          const input = document.querySelector("[data-new-order-search]");
          if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
          return;
        }

        if (event.target.matches("[data-link-input]")) {
          state.link = event.target.value;
          state.linkChecked = false;
          // Update summary without full re-render (for performance)
          const totalEl = document.querySelector(".order-summary-total");
          if (totalEl) totalEl.textContent = money(state.price);
          return;
        }

        if (event.target.matches("[data-qty-range]")) {
          setQuantity(event.target.value);
          render();
        }
      });

      document.addEventListener("change", (event) => {
        if (event.target.matches("[data-new-order-category]")) {
          state.selectedCategory = event.target.value;
          state.newOrderSubCat = "";
          state.newOrderSearch = "";
          state.newOrderPage = 1;
          render();
          return;
        }
        if (event.target.matches("[data-new-order-subcat]")) {
          state.newOrderSubCat = event.target.value;
          state.newOrderPage = 1;
          render();
          return;
        }
        if (event.target.matches("[data-service-category]")) {
          setServiceFilter(event.target.value, state.serviceSearch);
          state.serviceSubCat = "";
          state.servicesPage = 1;
          render();
          return;
        }
        if (event.target.matches("[data-service-subcat]")) {
          state.serviceSubCat = event.target.value;
          state.servicesPage = 1;
          render();
          return;
        }
        if (event.target.matches("[data-speed-filter]")) {
          state.speedFilter = event.target.value;
          render();
          const sel = document.querySelector("[data-speed-filter]");
          if (sel) sel.focus();
          return;
        }
        if (event.target.matches("[data-price-filter]")) {
          state.priceFilter = event.target.value;
          render();
          const sel = document.querySelector("[data-price-filter]");
          if (sel) sel.focus();
          return;
        }
        if (event.target.matches("[data-refill-filter]")) {
          state.refillFilter = event.target.checked;
          render();
          return;
        }
      });

      document.addEventListener("submit", (event) => {
        if (event.target.matches("[data-login-form]")) {
          event.preventDefault();
          const data = new FormData(event.target);
          const email = String(data.get("email") || "").trim().toLowerCase();
          const password = String(data.get("password") || "");

          apiPost("/api/auth/login", { email, password }).then((result) => {
            const user = result.user || {};
            state.isAuthenticated = true;
            state.currentUser = user;
            state.loginError = "";
            state.balance = user.balance || 0;
            localStorage.setItem("rectoboost_user", JSON.stringify(user));
            location.hash = "#/dashboard";
            // Reload orders after login
            setTimeout(loadOrders, 200);
          }).catch((error) => {
            state.loginError = error.message || "Email atau password salah.";
            render();
          });
          return;
        }

        if (event.target.matches("[data-signup-form]")) {
          event.preventDefault();
          const fd = new FormData(event.target);
          const fullName = String(fd.get("fullName") || fd.get("name") || "").trim();
          const email    = String(fd.get("email")    || "").trim().toLowerCase();
          const password = String(fd.get("password") || "");

          if (!fullName || !email || !password) {
            state.loginError = "Nama lengkap, email, dan password wajib diisi.";
            render();
            return;
          }

          const btn = event.target.querySelector("button[type=submit]");
          if (btn) btn.disabled = true;

          apiPost("/api/auth/register", { fullName, email, password })
            .then((result) => {
              const user = result.user || {};
              state.isAuthenticated = true;
              state.currentUser = user;
              state.loginError = "";
              state.balance = user.balance || 0;
              localStorage.setItem("rectoboost_user", JSON.stringify(user));
              location.hash = "#/dashboard";
              setTimeout(loadOrders, 200);
            })
            .catch((error) => {
              state.loginError = error.message || "Registrasi gagal. Coba lagi.";
              render();
            })
            .finally(() => { if (btn) btn.disabled = false; });
        }
      });

      function resetPage() {
        const params = new URLSearchParams(location.hash.split("?")[1] || "");
        const token  = params.get("token") || "";
        if (!token) {
          return `<div class="auth-page"><section class="auth-card" style="max-width:420px;margin:auto"><div style="text-align:center">${svg(icon.shield,"circle-icon")}<h1>${state.lang==="id"?"Link Tidak Valid":"Invalid Link"}</h1><p>${state.lang==="id"?"Link reset tidak valid atau sudah kadaluarsa.":"Reset link is invalid or has expired."}</p><a class="btn primary block" href="#/forgot">${state.lang==="id"?"Minta Link Baru":"Request New Link"}</a></div></section></div>`;
        }
        return `<div class="auth-page"><section class="auth-card" style="max-width:420px;margin:auto">
          <div style="text-align:center">${svg(icon.shield,"circle-icon")}<h1>${t("resetTitle")}</h1><p>${state.lang==="id"?"Masukkan password baru untuk akun kamu.":"Enter a new password for your account."}</p></div>
          <form class="auth-form" data-reset-form data-token="${attr(token)}">
            <label>${t("newPassword")}<input class="field" name="password" type="password" placeholder="Min. 8 ${state.lang==="id"?"karakter":"characters"}" autocomplete="new-password" /></label>
            <label>${t("confirmNewPassword")}<input class="field" name="password2" type="password" placeholder="${state.lang==="id"?"Ulangi password baru":"Repeat new password"}" autocomplete="new-password" /></label>
            <div class="auth-error ${state.loginError ? "show" : ""}">${state.loginError}</div>
            <button class="btn primary block" type="submit">${t("savePassword")}</button>
          </form>
        </section></div>`;
      }

      document.addEventListener("submit", (event) => {
        if (event.target.matches("[data-forgot-form]")) {
          event.preventDefault();
          const email = String(new FormData(event.target).get("email") || "").trim().toLowerCase();
          if (!email) { state.loginError = "Email wajib diisi."; render(); return; }

          const btn = event.target.querySelector("button[type=submit]");
          if (btn) { btn.disabled = true; btn.textContent = "Mengirim..."; }
          state.loginError = "";

          apiPost("/api/auth/forgot", { email })
            .then(() => { location.hash = "#/reset-sent"; })
            .catch((e) => { state.loginError = e.message || "Gagal mengirim. Coba lagi."; render(); })
            .finally(() => { if (btn) { btn.disabled = false; btn.textContent = "Kirim Link Reset"; } });
          return;
        }

        if (event.target.matches("[data-reset-form]")) {
          event.preventDefault();
          const fd       = new FormData(event.target);
          const password  = String(fd.get("password")  || "");
          const password2 = String(fd.get("password2") || "");
          const token     = event.target.dataset.token || "";

          if (password.length < 8) { state.loginError = "Password minimal 8 karakter."; render(); return; }
          if (password !== password2) { state.loginError = "Password tidak cocok."; render(); return; }
          if (!token) { state.loginError = "Token tidak valid."; render(); return; }

          const btn = event.target.querySelector("button[type=submit]");
          if (btn) { btn.disabled = true; btn.textContent = "Menyimpan..."; }
          state.loginError = "";

          apiPost("/api/auth/reset", { token, password })
            .then(() => {
              state.loginError = "";
              location.hash = "#/login";
              setTimeout(() => { state.filterNote = "Password berhasil diubah. Silakan login."; render(); }, 100);
            })
            .catch((e) => { state.loginError = e.message || "Gagal reset password."; render(); })
            .finally(() => { if (btn) { btn.disabled = false; btn.textContent = "Simpan Password Baru"; } });
          return;
        }
      });

      // Restore sidebar collapsed state
      if (localStorage.getItem("sb_collapsed") === "1" && window.innerWidth >= 768) {
        document.body.classList.add("sidebar-collapsed");
      }

      window.addEventListener("hashchange", render);
      if (!location.hash) location.hash = state.isAuthenticated ? "#/dashboard" : "#/login";

      // If no localStorage session, check cookie (post-Google OAuth)
      if (!_storedUser) {
        fetch("/api/auth/me", { credentials: "include" })
          .then(r => r.ok ? r.json() : null)
          .then(data => {
            if (data?.user) {
              state.isAuthenticated = true;
              state.currentUser = data.user;
              state.balance = data.user.balance || 0;
              localStorage.setItem("rectoboost_user", JSON.stringify(data.user));
              location.hash = "#/dashboard";
              render();
            }
          })
          .catch(() => {});
      }

      render();
      syncSmmwiz();
    </script>
  </body>
</html>
